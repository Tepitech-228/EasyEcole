<a *ngIf="cours" [routerLink]="['./' + cours.id]" class="block mb-8">
    <div id="card" class="w-full h-full bg-white shadow-sm ring-1 ring-gray-200 rounded-lg overflow-hidden">
        <img class="w-full object-cover object-center" style="aspect-ratio: 16 / 9 !important;"
            [src]="'assets/images/blank-card-picture.jpg'"
            alt="img">
        <div class="py-4 px-4">
            <div class="text-md font-semibold text-gray-900 line-clamp-2">{{ cours.code }} - {{ cours.intitule }} - {{ cours.parcours?.id }}</div>
    
            <div class="mt-4 space-y-2">
                <div *ngIf="cours.parcours?.niveauEtude" class="flex items-center text-secondary">
                    <img src="assets/icons/student.svg" alt="icon">
                    <div class="px-2 text-sm">{{ cours.parcours?.niveauEtude?.libelle ?? '---' }}</div>
                </div>
                <div class="flex items-center text-secondary">
                    <img src="assets/icons/category-light.svg" alt="icon">
                    <div class="px-2 text-sm">{{ cours.classe ? cours.classe.libelle : '---' }}</div>
                </div>
                <div *ngIf="cours.enseignant && cours.enseignant.utilisateur" class="flex items-center text-secondary">
                    <img src="assets/icons/student.svg" alt="icon">
                    <div class="px-2 text-sm">{{ cours.enseignant.utilisateur.nom + ' ' + cours.enseignant.utilisateur.prenoms }}</div>
                </div>
                <!-- <div class="flex items-center text-secondary">
                    <img src="assets/icons/clock-outline.svg" alt="icon">
                    <div class="px-2 text-sm">{{ getDuree() }}</div>
                </div> -->
            </div>
        </div>
    </div>
</a>
