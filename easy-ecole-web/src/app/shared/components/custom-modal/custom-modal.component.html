<!-- // Modal -->
<div *ngIf="showModal" class="fixed inset-0 z-50 p-4 overflow-x-hidden overflow-y-auto transition-all" style="min-height: 100vh;">
    <div class="flex justify-center items-center w-full overflow-y-auto" [ngClass]="center ? 'items-center' : ''" style="min-height: 100%;">
        <div class="max-w-4xl px-3 py-4 bg-white w-full overflow-y-auto rounded shadow transition-all dark:bg-gray-700">
            <div class="md:px-4 px-2 mt-3 mb-8">
                <div class="flex w-full justify-between gap-x-8" [ngClass]="subtitle ? 'items-start' : 'items-center'">
                    <div class="flex flex-col gap-y-2">
                        <div class="text-base font-semibold leading-6 text-gray-700" id="modal-title">
                            {{ title }}
                        </div>
                        <div *ngIf="subtitle" class="text-sm text-gray-500">
                            {{ subtitle }}
                        </div>
                    </div>
                    <button (click)="closeModal()" type="button"
                        class="bg-white rounded-md p-2 inline-flex items-center justify-center text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500">
                        <span class="sr-only">Close menu</span>
                        <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="md:px-4 px-2 md:mb-8 mb-0">
                <ng-content></ng-content>
            </div>
        </div>
    </div>
</div>
<div *ngIf="showModal" class="opacity-25 fixed inset-0 z-40 bg-black"></div>
