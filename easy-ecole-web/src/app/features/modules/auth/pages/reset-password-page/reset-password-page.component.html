<app-custom-alert [show]="error" title="Erreur" color="red">Le lien de réinitialisation est invalide ou a expiré.</app-custom-alert>
<app-custom-alert [show]="confirmError" title="Erreur" color="red">Les mots de passe ne correspondent pas.</app-custom-alert>
<app-custom-alert [show]="success" title="Succès" color="green">Mot de passe réinitialisé. Redirection vers la connexion...</app-custom-alert>

<app-auth-layout title="Réinitialisation" subtitle="Choisissez un nouveau mot de passe" [showBottom]="true"
    bottomText="" bottomLinkText="" bottomLink="">
    <form [formGroup]="form">
        <div class="grid grid-cols-1 gap-10">
            <div class="block">
                <label class="text-sm leading-6 text-gray-900">Nouveau mot de passe</label>
                <input type="password" formControlName="password" class="mt-1 w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"
                    placeholder="********" required />
            </div>
            <div class="block">
                <label class="text-sm leading-6 text-gray-900">Confirmer le mot de passe</label>
                <input type="password" formControlName="confirmPassword" class="mt-1 w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"
                    placeholder="********" required />
            </div>
            <div class="w-full">
                <app-custom-button (click)="resetPassword()" [text]="resetting ? 'Réinitialisation...' : 'Réinitialiser'" [fullWidth]="true" [disabled]="resetting || form.invalid"></app-custom-button>
            </div>
        </div>
    </form>
</app-auth-layout>
