<app-custom-alert [show]="error" title="Erreur" color="red">Email introuvable. Vérifiez votre adresse.</app-custom-alert>
<app-custom-alert [show]="success" title="Succès" color="green">Un lien de réinitialisation vous a été envoyé par email.</app-custom-alert>

<app-auth-layout title="Mot de passe oublié" subtitle="Entrez votre email pour recevoir un lien de réinitialisation" [showBottom]="true"
    bottomText="Vous vous souvenez de votre mot de passe ?" bottomLinkText="Connectez-vous" bottomLink="../connexion">
    <form [formGroup]="form">
        <div class="grid grid-cols-1 gap-10">
            <div class="block">
                <label class="text-sm leading-6 text-gray-900">Adresse email</label>
                <input type="email" formControlName="email" class="mt-1 w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"
                    placeholder="exemple@email.com" required />
            </div>
            <div class="w-full">
                <app-custom-button (click)="sendResetLink()" [text]="sending ? 'Envoi en cours...' : 'Envoyer le lien'" [fullWidth]="true" [disabled]="sending || form.invalid"></app-custom-button>
            </div>
        </div>
    </form>
</app-auth-layout>
