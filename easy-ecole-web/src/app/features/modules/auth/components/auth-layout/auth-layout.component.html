<div class="flex relative">
    <div class="w-3/5 hidden lg:block"></div>
    <div class="w-3/5 fixed top-0 bottom-0 hidden lg:block">
        <div class="overlay bg-primary w-full h-full">
            <div class="w-full h-full flex flex-col justify-between items-center text-center px-10 py-20">
                <div>
                    <span class="text-lg text-white opacity-90 tracking-wide uppercase font-medium">Easy Ecole</span>
                    <!-- <img src="" alt=""> -->
                </div>

                <img class="h-56" src="assets/logos/logo.svg" alt="logo">

                <div class="text-sm text-white opacity-60">@ Easy Ecole v1.0 Tous droits réservés</div>
            </div>
        </div>
    </div>
    <div class="w-full lg:w-2/5 h-screen flex flex-col items-center px-6 md:px-10 lg:px-15 py-12">
        <!-- <div *ngIf="showReturn" class="w-full text-white mb-12 text-right">
            Retour
        </div> -->
        <div class="w-full mb-12 flex justify-center items-center">
            <img class="h-20" src="assets/images/logo2.png" alt="logo">
        </div>
        <div class="w-full mb-12">
            <h2 class="text-2xl font-bold">{{ title }}</h2>
            <p class="text-base text-gray-500">{{ subtitle }}</p>
        </div>
        <div class="mt-8 w-full">
            <ng-content></ng-content>

            <p class="mt-4 mb-6 text-center text-sm text-gray-500">
                {{ bottomText }}
                <a [routerLink]="bottomLink" class="font-semibold leading-6 text-indigo-600 hover:text-indigo-500">{{ bottomLinkText }}</a>
            </p>
        </div>
        <div class="pb-4 w-full block lg:hidden">
            <p class="text-center text-sm text-gray-500">
                @ <a [routerLink]="bottomLink" class="font-semibold leading-6 text-indigo-600 hover:text-indigo-500">Easy Ecole</a> v1.0
            </p>
        </div>
    </div>
</div>
