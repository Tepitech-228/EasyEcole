<ng-container *ngIf="cours">
    <div class="flex md:flex-row flex-col items-start justify-between mb-8">
        <app-header-title title="{{ cours.code }} - {{ cours.intitule }}">
            <div class="mt-2 md:mb-0 mb-8 flex md:flex-row flex-wrap gap-x-4 gap-y-2">
                <div *ngIf="cours.parcours?.niveauEtude" class="flex items-center text-secondary">
                    <img src="assets/icons/student.svg" alt="icon">
                    <div class="px-2 text-sm">{{ cours.parcours?.niveauEtude?.libelle ?? '---' }}</div>
                </div>
                <div class="flex items-center text-secondary">
                    <img src="assets/icons/category-light.svg" alt="icon">
                    <div class="px-2 text-sm">{{ cours.classe ? cours.classe.libelle : '---' }}</div>
                </div>
            </div>
        </app-header-title>
        <div class="flex justify-end items-center gap-x-4">
            <app-custom-button *ngIf="rolesValue.isEnseignant && activeTab == 1" text="Nouveau chapître" link="./chapitres/new"></app-custom-button>
            <app-custom-button *ngIf="(rolesValue.isEnseignant || rolesValue.isInstitution) && activeTab == 2" text="Nouvelle seance" (click)="openNouvelleSeanceModal()"></app-custom-button>
        </div>
    </div>

<!-- Modals -->
<app-custom-modal title="Nouvelle seance" subtitle="Ajouter une nouvelle seance" (onCloseModal)="showNouvelleSeanceModal = false" [center]="true" [showModal]="showNouvelleSeanceModal">
    <form [formGroup]="nouvelleSeanceForm">
        <div class="grid grid-cols-6 md:gap-x-24 gap-x-0 gap-y-10 mb-8">
            <div class="col-span-full">
                <label for="titre" class="mb-2 block text-sm leading-6 text-gray-600">Titre</label>
                <input type="text" id="titre" formControlName="titre" placeholder="Saisir le titre ici..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
            </div>
            <div class="col-span-3">
                <label for="jour" class="mb-2 block text-sm leading-6 text-gray-600">Jour de la semaine</label>
                <select id="jour" formControlName="jour"
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                    <option [value]="null">Sélectionner un jour</option>
                    <option [value]="joursSemaine.LUNDI">Lundi</option>
                    <option [value]="joursSemaine.MARDI">Mardi</option>
                    <option [value]="joursSemaine.MERCREDI">Mercredi</option>
                    <option [value]="joursSemaine.JEUDI">Jeudi</option>
                    <option [value]="joursSemaine.VENDREDI">Vendredi</option>
                    <option [value]="joursSemaine.SAMEDI">Samedi</option>
                    <option [value]="joursSemaine.DIMANCHE">Dimanche</option>
                </select>
            </div>
            <div class="col-span-3">
                <label for="date" class="mb-2 block text-sm leading-6 text-gray-600">Date</label>
                <input type="date" id="date" formControlName="date" placeholder="Saisir la date ici..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
            </div>
            <div class="col-span-3">
                <label for="heureDebut" class="mb-2 block text-sm leading-6 text-gray-600">Heure de début</label>
                <input type="time" id="heureDebut" formControlName="heureDebut" placeholder="Saisir l'écheance ici..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <!-- <div *ngIf="nouvelleSeanceForm.get('titre')!.invalid && (nouvelleSeanceForm.get('titre')!.dirty || nouvelleSeanceForm.get('titre')!.touched)">
                    <app-form-message *ngIf="nouvelleSeanceForm.get('titre')!.errors?.['required']"
                        text="Veuillez saisir le titre"></app-form-message>
                </div> -->
            </div>
            <div class="col-span-3">
                <label for="heureFin" class="mb-2 block text-sm leading-6 text-gray-600">Heure de fin</label>
                <input type="time" id="heureFin" formControlName="heureFin" placeholder="Saisir l'écheance ici..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <!-- <div *ngIf="nouvelleSeanceForm.get('titre')!.invalid && (nouvelleSeanceForm.get('titre')!.dirty || nouvelleSeanceForm.get('titre')!.touched)">
                    <app-form-message *ngIf="nouvelleSeanceForm.get('titre')!.errors?.['required']"
                        text="Veuillez saisir le titre"></app-form-message>
                </div> -->
            </div>
            <!-- <div class="col-span-full">
                <label for="" class="mb-2 block text-sm leading-6 text-gray-600">Fichier</label>
                <app-custom-file-picker [mediaType]="typesMedia.ALL" inputID="fichier" (onFileChanged)="onFichierChange($event)"></app-custom-file-picker>
                <div *ngIf="nouvelleSeanceForm.get('fichier')!.invalid && (nouvelleSeanceForm.get('fichier')!.dirty || nouvelleSeanceForm.get('fichier')!.touched)">
                    <app-form-message *ngIf="nouvelleSeanceForm.get('fichier')!.errors?.['required']"
                        text="Veuillez sélectionner au moins un fichier"></app-form-message>
                </div>
            </div> -->
        </div>
    </form>
    <div class="flex items-center justify-between py-3">
        <app-custom-button (click)="closeNouvelleSeanceModal()" text="Annuler" color="gray" [outlined]="true"></app-custom-button>
