<a *ngIf="parcours" [routerLink]="['./' + parcours.id]" class="block mb-8">
    <div id="card" class="w-full h-full bg-white shadow-sm ring-1 ring-gray-200 rounded-lg overflow-hidden">
        <img class="w-full object-cover object-center" style="aspect-ratio: 16 / 9 !important;"
            [src]="parcours.image ? PARCOURS_PATH + parcours.image :  'assets/images/blank-card-picture.jpg'"
            alt="img">
        <div class="py-4 px-4">
            <div class="text-md font-semibold text-gray-900 line-clamp-2">{{ parcours.titre }}</div>
    
            <div class="mt-4 space-y-2">
                <div *ngIf="parcours.categorie" class="flex items-center text-secondary">
                    <img src="assets/icons/category-light.svg" alt="icon">
                    <div class="px-2 text-sm">{{ parcours.categorie.libelle }}</div>
                </div>
                <div *ngIf="parcours.type" class="flex items-center text-secondary">
                    <div class="px-2 text-sm">
                        <span *ngIf="parcours.type === 'LICENCE'" class="px-2 py-1 text-xs font-medium rounded-full bg-blue-100 text-blue-700">Licence</span>
                        <span *ngIf="parcours.type === 'MASTER'" class="px-2 py-1 text-xs font-medium rounded-full bg-purple-100 text-purple-700">Master</span>
                        <span *ngIf="parcours.type === 'DOCTORAT'" class="px-2 py-1 text-xs font-medium rounded-full bg-green-100 text-green-700">Doctorat</span>
                    </div>
                </div>
                <div class="flex items-center text-secondary">
                    <img src="assets/icons/student.svg" alt="icon">
                    <div class="px-2 text-sm">{{ parcours.niveauEtude?.libelle }}</div>
                </div>
                <div class="flex items-center text-secondary">
                    <img src="assets/icons/clock-outline.svg" alt="icon">
                    <div class="px-2 text-sm">{{ getDuree() }}</div>
                </div>
            </div>
        </div>
    </div>
</a>
