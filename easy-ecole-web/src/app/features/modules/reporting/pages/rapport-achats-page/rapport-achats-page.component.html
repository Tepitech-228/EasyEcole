<div class="p-6 reporting-page">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Rapport Achats</h1>
    <app-export-pdf-button title="Achats"></app-export-pdf-button>
  </div>

  <div class="bg-white rounded-lg shadow p-6 mb-6">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">Volume d'Achats</h2>
    <div class="chart-placeholder">
      <span>Graphique à intégrer</span>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Période</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Demandes</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Commandes</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Montant Total</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let row of rows" class="hover:bg-gray-50">
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ row.periode }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.nbDemandes }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.nbCommandes }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.montantTotal | number }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
