<div class="p-6 reporting-page">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Rapport Paiements & Factures</h1>
    <app-export-pdf-button title="Paiements"></app-export-pdf-button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <app-stat-card label="Total Transactions" [value]="totaux.totalTransactions || '—'" colorClass="text-blue-600"></app-stat-card>
    <app-stat-card label="Montant Total" [value]="(totaux.totalMontant | number) || '—'" colorClass="text-green-600"></app-stat-card>
  </div>

  <div class="bg-white rounded-lg shadow p-6 mb-8">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">Évolution des Paiements</h2>
    <app-graphique-barre
      [labels]="paiementLabels"
      [data]="paiementData"
      label="Montant"
      color="#F59E0B">
    </app-graphique-barre>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-white rounded-lg shadow overflow-x-auto">
      <h3 class="px-6 py-3 text-sm font-semibold text-gray-700 border-b">Paiements</h3>
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Mode</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Montant</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let row of paiements" class="hover:bg-gray-50">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ row.date }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.modePaiement }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.montantTotal | number }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="bg-white rounded-lg shadow overflow-x-auto">
      <h3 class="px-6 py-3 text-sm font-semibold text-gray-700 border-b">Factures</h3>
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Mois</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nb</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Total</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let row of factures" class="hover:bg-gray-50">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ row.mois }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.nbFactures }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.montantTotal | number }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
