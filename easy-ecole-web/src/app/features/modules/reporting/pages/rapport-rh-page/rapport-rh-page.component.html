<div class="p-6 reporting-page">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Rapport Ressources Humaines</h1>
    <app-export-pdf-button title="RH"></app-export-pdf-button>
  </div>

  <div class="bg-white rounded-lg shadow p-6 mb-6">
    <h2 class="text-lg font-semibold text-gray-700 mb-4">Effectifs RH</h2>
    <div class="chart-placeholder">
      <span>Graphique à intégrer</span>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-white rounded-lg shadow overflow-x-auto">
      <h3 class="px-6 py-3 text-sm font-semibold text-gray-700 border-b">Effectifs RH</h3>
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Employés</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actifs</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let row of effectifs" class="hover:bg-gray-50">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ row.date }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.nbEmployes }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.nbActifs }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="bg-white rounded-lg shadow overflow-x-auto">
      <h3 class="px-6 py-3 text-sm font-semibold text-gray-700 border-b">Paie</h3>
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Période</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Brut</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Net</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let row of paie" class="hover:bg-gray-50">
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ row.periode }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.totalGains | number }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ row.netTotal | number }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
