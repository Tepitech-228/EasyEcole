<app-header-title title="Paramètres de paie"></app-header-title>

<div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
  <div class="border-b border-gray-100">
    <div class="px-6 py-4">
      <h3 class="text-lg font-semibold text-gray-900">Rubriques de paie</h3>
      <p class="text-sm text-gray-500 mt-1">Configurez les rubriques de paie (SALAIRE_BASE, CNPS, IRPP, primes, etc.).</p>
    </div>
  </div>
  <table class="min-w-full divide-y divide-gray-200">

      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Code</th>

        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Mode calcul</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Valeur</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      <tr class="hover:bg-gray-50">
        <td colspan="6" class="px-6 py-12 text-center text-sm text-gray-500">
          Aucune rubrique configurée
        </td>
      </tr>
    </tbody>
  </table>
</div>
