<app-header-title title="Employés"></app-header-title>

<div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
  <div class="p-4 border-b border-gray-100 flex items-center justify-between">
    <div class="relative">
      <input type="text" placeholder="Rechercher un employé..." class="w-64 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
    </div>
    <div class="flex gap-2">
      <select class="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        <option value="">Tous les départements</option>
      </select>
    </div>
  </div>
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Matricule</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom & Prénoms</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Poste</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Département</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Statut</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      <tr class="hover:bg-gray-50">
        <td colspan="6" class="px-6 py-12 text-center text-sm text-gray-500">
          Aucun employé trouvé
        </td>
      </tr>
    </tbody>
  </table>
</div>
