<app-header-title title="Paie"></app-header-title>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
  <div class="lg:col-span-2">
    <div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-gray-900">Périodes de paie</h3>
        <a routerLink="/rh/parametres-paie" class="text-sm text-indigo-600 hover:text-indigo-800">Paramètres</a>
      </div>
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Période</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Statut</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr class="hover:bg-gray-50">
            <td colspan="3" class="px-6 py-12 text-center text-sm text-gray-500">
              Aucune période trouvée
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div>
    <div class="bg-white rounded-lg shadow border border-gray-100 p-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">Nouvelle période</h3>
      <p class="text-sm text-gray-500">Formulaire d'ajout de période à implémenter.</p>
    </div>
  </div>
</div>
