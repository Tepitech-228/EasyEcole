<app-header-title title="Offres d'emploi"></app-header-title>

<div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
  <div class="p-4 border-b border-gray-100">
    <p class="text-sm text-gray-500">Gérez les offres d'emploi publiées par l'établissement.</p>
  </div>
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Poste</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date publication</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date clôture</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Statut</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      <tr class="hover:bg-gray-50">
        <td colspan="5" class="px-6 py-12 text-center text-sm text-gray-500">
          Aucune offre trouvée
        </td>
      </tr>
    </tbody>
  </table>
</div>
