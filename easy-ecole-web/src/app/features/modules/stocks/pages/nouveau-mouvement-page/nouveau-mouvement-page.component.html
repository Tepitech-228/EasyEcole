<app-custom-alert [show]="error || alreadyExists" title="Erreur">
    {{ error ? 'Une erreur est survenue' : '' }}
    {{ alreadyExists ? 'Ce mouvement existe déjà.' : '' }}
</app-custom-alert>
<app-return-back></app-return-back>
<div class="flex justify-between items-start mb-8">
    <app-header-title title="Créer un nouveau mouvement" subtitle="Veuillez renseigner les informations ci-dessous"></app-header-title>
</div>
<div class="w-full mb-8">
    <form [formGroup]="form" id="form">
        <div class="grid grid-cols-6 md:gap-x-24 gap-x-0 gap-y-10 mb-8">
            <div class="md:col-span-3 col-span-full">
                <label for="articleId" class="mb-2 block text-sm leading-6 text-gray-600">Article</label>
                <input type="text" id="articleId" formControlName="articleId" placeholder="ID de l'article..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <div *ngIf="form.get('articleId')!.invalid && (form.get('articleId')!.dirty || form.get('articleId')!.touched)">
                    <app-form-message *ngIf="form.get('articleId')!.errors?.['required']" text="Veuillez saisir l'article"></app-form-message>
                </div>
            </div>
            <div class="md:col-span-3 col-span-full">
                <label for="type" class="mb-2 block text-sm leading-6 text-gray-600">Type</label>
                <select id="type" formControlName="type"
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                    <option value="" disabled>Sélectionner le type...</option>
                    <option value="entree">Entrée</option>
                    <option value="sortie">Sortie</option>
                </select>
                <div *ngIf="form.get('type')!.invalid && (form.get('type')!.dirty || form.get('type')!.touched)">
                    <app-form-message *ngIf="form.get('type')!.errors?.['required']" text="Veuillez sélectionner le type"></app-form-message>
                </div>
            </div>
            <div class="md:col-span-3 col-span-full">
                <label for="quantite" class="mb-2 block text-sm leading-6 text-gray-600">Quantité</label>
                <input type="number" id="quantite" formControlName="quantite" placeholder="Saisir la quantité..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <div *ngIf="form.get('quantite')!.invalid && (form.get('quantite')!.dirty || form.get('quantite')!.touched)">
                    <app-form-message *ngIf="form.get('quantite')!.errors?.['required']" text="Veuillez saisir la quantité"></app-form-message>
                </div>
            </div>
            <div class="md:col-span-3 col-span-full">
                <label for="prixUnitaire" class="mb-2 block text-sm leading-6 text-gray-600">Prix unitaire (FCFA)</label>
                <input type="number" id="prixUnitaire" formControlName="prixUnitaire" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
            </div>
            <div class="md:col-span-3 col-span-full">
                <label for="fournisseurId" class="mb-2 block text-sm leading-6 text-gray-600">Fournisseur</label>
                <input type="text" id="fournisseurId" formControlName="fournisseurId" placeholder="ID du fournisseur..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
            </div>
            <div class="md:col-span-3 col-span-full">
                <label for="siteId" class="mb-2 block text-sm leading-6 text-gray-600">Site</label>
                <select id="siteId" formControlName="siteId"
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                    <option [value]="null">Tous les sites</option>
                    <option *ngFor="let site of sites" [value]="site.id">{{ site.nom }}</option>
                </select>
            </div>
            <div class="col-span-full">
                <label for="motif" class="mb-2 block text-sm leading-6 text-gray-600">Motif</label>
                <textarea rows="3" id="motif" formControlName="motif" placeholder="Saisir le motif..."
                    class="w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"></textarea>
            </div>
        </div>
        <div class="w-full flex justify-end items-center pb-12">
            <app-custom-button (click)="create()" [disabled]="disableButton" text="Enregistrer"></app-custom-button>
        </div>
    </form>
</div>
