<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <app-header-title
    title="Fournisseurs"
    subtitle="Gérez les fournisseurs et leurs coordonnées">
  </app-header-title>

  <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
    <div class="bg-white rounded-2xl border border-gray-100 p-5 shadow-sm">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Total</p>
          <p class="mt-1 text-2xl font-bold text-gray-900">{{ fournisseurs.length }}</p>
        </div>
        <div class="h-10 w-10 rounded-xl bg-blue-50 flex items-center justify-center">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        </div>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-100 p-5 shadow-sm">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Contact principal</p>
          <p class="mt-1 text-lg font-bold text-gray-900 truncate">{{ fournisseurs[0]?.nom || '-' }}</p>
        </div>
        <div class="h-10 w-10 rounded-xl bg-red-50 flex items-center justify-center">
          <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </div>
      </div>
    </div>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-6">
    <div class="flex justify-end">
      <app-custom-button *ngIf="rolesValue.isInstitution || rolesValue.isAdmin || rolesValue.isCaissierBanque" (click)="ouvrirFormulaire()" text="Nouveau fournisseur" color="red"></app-custom-button>
    </div>
  </div>

  <div *ngIf="showForm" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-6">
    <h3 class="text-lg font-semibold text-gray-900 mb-4">Nouveau fournisseur</h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Nom *</label>
        <input [(ngModel)]="formData.nom" type="text" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500" placeholder="Nom du fournisseur" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Contact</label>
        <input [(ngModel)]="formData.contact" type="text" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500" placeholder="Personne à contacter" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Email</label>
        <input [(ngModel)]="formData.email" type="email" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500" placeholder="email@exemple.com" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Téléphone</label>
        <input [(ngModel)]="formData.telephone" type="text" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500" placeholder="+225 01 02 03 04" />
      </div>
      <div class="sm:col-span-2 lg:col-span-3">
        <label class="block text-xs font-medium text-gray-500 mb-1">Adresse</label>
        <textarea [(ngModel)]="formData.adresse" rows="2" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500" placeholder="Adresse..."></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-4">
      <app-custom-button (click)="fermerFormulaire()" text="Annuler" color="gray" [outlined]="true"></app-custom-button>
      <app-custom-button (click)="creerFournisseur()" text="Créer" color="red"></app-custom-button>
    </div>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-100">
        <thead>
          <tr class="bg-gray-50/50">
            <th class="px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Nom</th>
            <th class="px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Contact</th>
            <th class="px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
            <th class="px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Téléphone</th>
            <th class="px-5 py-3.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr *ngFor="let f of fournisseurs; trackBy: trackByFn" class="hover:bg-gray-50/50 transition-colors">
            <td class="px-5 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ f.nom }}</td>
            <td class="px-5 py-4 whitespace-nowrap text-sm text-gray-700">{{ f.contact || '-' }}</td>
            <td class="px-5 py-4 whitespace-nowrap text-sm text-gray-700">{{ f.email || '-' }}</td>
            <td class="px-5 py-4 whitespace-nowrap text-sm text-gray-700">{{ f.telephone || '-' }}</td>
            <td class="px-5 py-4 whitespace-nowrap text-right">
              <div class="flex items-center justify-end gap-2">
                <app-custom-button *ngIf="rolesValue.isInstitution || rolesValue.isAdmin || rolesValue.isCaissierBanque" (click)="supprimer(f.id)" text="Supprimer" color="red" [outlined]="true"></app-custom-button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <app-loading-spinner *ngIf="loading"></app-loading-spinner>
    <div *ngIf="!loading && fournisseurs.length === 0" class="px-5 py-12 text-center">
      <svg class="mx-auto h-12 w-12 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      <p class="mt-4 text-sm text-gray-500">Aucun fournisseur enregistré</p>
    </div>
  </div>
</div>
