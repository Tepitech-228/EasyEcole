<app-custom-alert [show]="error" title="Erreur">Une erreur est survenue</app-custom-alert>
<app-return-back></app-return-back>
<ng-container *ngIf="article">
    <div class="flex md:flex-row flex-col items-start justify-between mb-8">
        <app-header-title title="{{ article.nom }}">
            <div class="mt-2 md:mb-0 mb-8 flex md:flex-row flex-wrap gap-x-4 gap-y-2">
                <div class="flex items-center text-secondary"><div class="px-2 text-sm">Réf: {{ article.reference }}</div></div>
            </div>
        </app-header-title>
        <div *ngIf="rolesValue.isInstitution || rolesValue.isCaissierBanque" class="w-full md:w-32 flex justify-end items-center gap-x-4">
            <button (click)="delete()" class="flex w-full items-center justify-center gap-x-2 rounded-md bg-red-600 px-4 py-2 text-sm font-medium leading-6 text-white shadow-sm hover:bg-red-500"><img src="assets/icons/trash.svg" alt="delete"> Supprimer</button>
        </div>
    </div>
    <div class="grid grid-cols-2 gap-8 mb-8">
        <div><span class="text-sm text-gray-500">Stock actuel:</span> <span class="text-sm font-semibold" [class.text-red-600]="article.stockActuel! <= article.stockMinimum!">{{ article.stockActuel }}</span></div>
        <div><span class="text-sm text-gray-500">Stock minimum:</span> <span class="text-sm">{{ article.stockMinimum }}</span></div>
        <div><span class="text-sm text-gray-500">Prix unitaire:</span> <span class="text-sm">{{ article.prixUnitaire | number }} FCFA</span></div>
        <div><span class="text-sm text-gray-500">Site:</span> <span class="text-sm">{{ article.site?.nom || 'Tous les sites' }}</span></div>
        <div class="col-span-2"><span class="text-sm text-gray-500">Description:</span> <span class="text-sm">{{ article.description }}</span></div>
    </div>
</ng-container>
