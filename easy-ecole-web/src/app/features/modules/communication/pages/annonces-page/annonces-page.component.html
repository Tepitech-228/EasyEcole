<div class="p-6 space-y-6">
  <div class="rounded-3xl border border-slate-200 bg-gradient-to-r from-slate-900 via-slate-800 to-blue-900 p-6 text-white shadow-sm">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <p class="text-sm uppercase tracking-[0.3em] text-slate-300">Communication institutionnelle</p>
        <h2 class="mt-2 text-2xl font-semibold">Annonces</h2>
        <p class="mt-2 max-w-2xl text-sm text-slate-300">Diffusez les informations importantes de l'établissement dans un espace clair et structuré.</p>
      </div>
      <app-custom-button *ngIf="rolesValue.isInstitution || rolesValue.isAdmin" text="Nouvelle annonce" link="/communication/annonces/nouveau"></app-custom-button>
    </div>
  </div>

  <div class="space-y-4">
    <div *ngFor="let annonce of annonces" class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-md">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1">
          <div class="flex flex-wrap items-center gap-2">
            <h3 class="text-lg font-semibold text-slate-900">{{ annonce.titre }}</h3>
            <app-custom-badge *ngIf="annonce.utilisateur" [text]="annonce.utilisateur.prenoms + ' ' + annonce.utilisateur.nom" color="blue"></app-custom-badge>
            <app-custom-badge *ngIf="annonce.cible" [text]="cibleLabel(annonce.cible)" color="gray"></app-custom-badge>
          </div>
          <p class="mt-3 text-sm leading-7 text-slate-600">{{ annonce.contenu }}</p>
          <div class="mt-4 flex flex-wrap items-center gap-3 text-sm text-slate-500">
            <span class="rounded-full bg-slate-100 px-2.5 py-1">{{ annonce.datePublication | date:'dd MMMM yyyy' }}</span>
          </div>
        </div>
        <button *ngIf="rolesValue.isInstitution || rolesValue.isAdmin" (click)="supprimerAnnonce(annonce.id!)" class="rounded-full p-2 text-slate-400 transition hover:bg-red-50 hover:text-red-600" title="Supprimer">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div *ngIf="annonces.length === 0" class="rounded-2xl border border-dashed border-slate-200 bg-slate-50 p-10 text-center text-slate-500">
      Aucune annonce pour le moment.
    </div>
  </div>
</div>
