<div class="p-6">
  <app-header-title title="Annonces" subtitle="Toutes les annonces"></app-header-title>

  <div class="mt-6 flex items-center justify-between">
    <app-custom-button text="Nouvelle annonce" link="/communication/annonces/nouveau"></app-custom-button>
  </div>

  <div class="mt-4 space-y-4">
    <div *ngFor="let annonce of annonces" class="bg-white rounded-lg shadow p-5">
      <div class="flex justify-between items-start">
        <div class="flex-1">
          <h3 class="text-lg font-semibold text-gray-900">{{ annonce.titre }}</h3>
          <p class="text-gray-600 mt-2">{{ annonce.contenu }}</p>
          <div class="flex items-center gap-3 mt-3 text-xs text-gray-400">
            <app-custom-badge [text]="annonce.auteur" color="blue"></app-custom-badge>
            <span>{{ annonce.date | date:'dd MMMM yyyy' }}</span>
          </div>
        </div>
        <button (click)="supprimerAnnonce(annonce.id)" class="text-gray-400 hover:text-red-600 ml-4 shrink-0" title="Supprimer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div *ngIf="annonces.length === 0" class="bg-white rounded-lg shadow p-8 text-center text-gray-500">
      Aucune annonce pour le moment
    </div>
  </div>
</div>
