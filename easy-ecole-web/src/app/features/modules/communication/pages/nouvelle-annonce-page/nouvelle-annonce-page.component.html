<div class="p-6">
  <app-header-title title="Nouvelle annonce" subtitle="Créer une annonce"></app-header-title>

  <div class="mt-6 max-w-2xl">
    <app-custom-alert *ngIf="submitted" [show]="true" type="success" title="Annonce créée" message="L'annonce a été publiée avec succès."></app-custom-alert>
    <app-custom-alert *ngIf="error" [show]="true" type="danger" title="Erreur" message="Veuillez remplir tous les champs."></app-custom-alert>

    <div class="bg-white rounded-lg shadow p-6">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
        <input [(ngModel)]="nouvelleAnnonce.titre" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Contenu</label>
        <textarea [(ngModel)]="nouvelleAnnonce.contenu" rows="6" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
      </div>
      <div class="flex items-center gap-3">
        <button (click)="creerAnnonce()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">
          Publier
        </button>
        <app-custom-button text="Annuler" link="/communication/annonces" color="gray"></app-custom-button>
      </div>
    </div>
  </div>
</div>
