<div class="p-6 space-y-6">
  <div class="rounded-3xl border border-slate-200 bg-gradient-to-r from-slate-900 via-slate-800 to-blue-900 p-6 text-white shadow-sm">
    <div>
      <p class="text-sm uppercase tracking-[0.3em] text-slate-300">Publication institutionnelle</p>
      <h2 class="mt-2 text-2xl font-semibold">Nouvelle annonce</h2>
      <p class="mt-2 max-w-2xl text-sm text-slate-300">Rédigez une information claire destinée à toute la communauté académique.</p>
    </div>
  </div>

  <div class="max-w-3xl rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
    <app-custom-alert *ngIf="submitted" [show]="true" type="success" title="Annonce créée" message="L'annonce a été publiée avec succès."></app-custom-alert>
    <app-custom-alert *ngIf="error" [show]="true" type="danger" title="Erreur" message="Veuillez remplir tous les champs."></app-custom-alert>

    <div class="space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Titre</label>
        <input [(ngModel)]="nouvelleAnnonce.titre" class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Contenu</label>
        <textarea [(ngModel)]="nouvelleAnnonce.contenu" rows="6" class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></textarea>
      </div>
      <div class="flex flex-wrap items-center gap-3 pt-2">
        <button (click)="creerAnnonce()" class="rounded-2xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700">
          Publier
        </button>
        <app-custom-button text="Annuler" link="/communication/annonces" color="gray"></app-custom-button>
      </div>
    </div>
  </div>
</div>
