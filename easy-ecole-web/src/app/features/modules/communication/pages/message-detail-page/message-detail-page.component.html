<div class="p-6">
  <app-header-title [title]="message ? message.sujet : 'Message introuvable'" subtitle="Détail du message"></app-header-title>

  <div class="mt-6 max-w-3xl">
    <app-custom-button text="Retour à la messagerie" link="/communication/messagerie" color="gray"></app-custom-button>

    <div *ngIf="message" class="bg-white rounded-lg shadow mt-4 p-6">
      <div class="border-b pb-4">
        <h1 class="text-xl font-bold text-gray-900">{{ message.sujet }}</h1>
        <div class="mt-3 text-sm text-gray-600 space-y-1">
          <p><span class="font-medium">De:</span> {{ message.expediteur }}</p>
          <p><span class="font-medium">À:</span> {{ message.destinataire }}</p>
          <p><span class="font-medium">Date:</span> {{ message.date | date:'EEEE d MMMM yyyy, HH:mm' }}</p>
        </div>
      </div>
      <div class="mt-4">
        <p class="text-gray-700 whitespace-pre-line leading-relaxed">{{ message.contenu }}</p>
      </div>
    </div>

    <div *ngIf="!message" class="bg-white rounded-lg shadow mt-4 p-8 text-center text-gray-500">
      Message introuvable
    </div>
  </div>
</div>
