<div class="p-6 space-y-6">
  <div class="rounded-3xl border border-slate-200 bg-gradient-to-r from-slate-900 via-slate-800 to-blue-900 p-6 text-white shadow-sm">
    <div>
      <p class="text-sm uppercase tracking-[0.3em] text-slate-300">Nouveau contact</p>
      <h2 class="mt-2 text-2xl font-semibold">Nouveau message</h2>
      <p class="mt-2 max-w-2xl text-sm text-slate-300">Rédigez un message clair et professionnel à destination de l’équipe pédagogique ou administrative.</p>
    </div>
  </div>

  <div class="max-w-3xl rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
    <app-custom-alert *ngIf="submitted" [show]="true" type="success" title="Message envoyé" message="Votre message a été envoyé avec succès."></app-custom-alert>
    <app-custom-alert *ngIf="error" [show]="true" type="danger" title="Erreur" message="Veuillez remplir tous les champs."></app-custom-alert>

    <div class="space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Destinataire</label>
        <select [(ngModel)]="nouveauMessage.destinataire" class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
          <option value="" disabled>Sélectionnez un destinataire</option>
          <option *ngFor="let dest of destinataires" [value]="dest">{{ dest }}</option>
        </select>
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Sujet</label>
        <input [(ngModel)]="nouveauMessage.sujet" class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Message</label>
        <textarea [(ngModel)]="nouveauMessage.contenu" rows="6" class="w-full rounded-2xl border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></textarea>
      </div>
      <div class="flex flex-wrap items-center gap-3 pt-2">
        <button (click)="envoyerMessage()" class="rounded-2xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700">
          Envoyer
        </button>
        <app-custom-button text="Annuler" link="/communication/messagerie" color="gray"></app-custom-button>
      </div>
    </div>
  </div>
</div>
