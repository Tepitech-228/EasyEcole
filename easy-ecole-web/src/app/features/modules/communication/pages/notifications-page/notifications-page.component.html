<div class="p-6 space-y-6">
  <div class="rounded-3xl border border-slate-200 bg-gradient-to-r from-slate-900 via-slate-800 to-amber-900 p-6 text-white shadow-sm">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <p class="text-sm uppercase tracking-[0.3em] text-slate-300">Alertes et rappels</p>
        <h2 class="mt-2 text-2xl font-semibold">Notifications</h2>
        <p class="mt-2 max-w-2xl text-sm text-slate-300">Gardez un œil sur les informations importantes et les mises à jour du campus.</p>
      </div>
      <button *ngIf="nonLues > 0" (click)="marquerToutCommeLu()" class="rounded-xl border border-white/20 bg-white/10 px-3 py-2 text-sm font-semibold text-white transition hover:bg-white/20">
        Tout marquer comme lu
      </button>
    </div>
  </div>

  <div class="rounded-3xl border border-slate-200 bg-white shadow-sm">
    <div *ngFor="let notif of notifications" class="flex items-start gap-3 border-b border-slate-100 p-4 transition hover:bg-slate-50">
      <div class="mt-1.5">
        <span class="block h-2.5 w-2.5 rounded-full" [class.bg-blue-600]="!notif.lue" [class.bg-slate-300]="notif.lue"></span>
      </div>
      <div class="min-w-0 flex-1" (click)="marquerCommeLue(notif.id)">
        <div class="flex items-center justify-between gap-3">
          <p class="text-sm font-medium text-slate-800" [class.font-semibold]="!notif.lue">{{ notif.titre }}</p>
          <span class="shrink-0 text-xs text-slate-400">{{ notif.date | date:'dd/MM/yyyy HH:mm' }}</span>
        </div>
        <p class="mt-1 text-sm text-slate-600">{{ notif.message }}</p>
      </div>
      <button (click)="supprimerNotification(notif.id)" class="shrink-0 rounded-full p-2 text-slate-400 transition hover:bg-red-50 hover:text-red-600" title="Supprimer">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div *ngIf="notifications.length === 0" class="p-10 text-center text-slate-500">
      Aucune notification disponible.
    </div>
  </div>
</div>
