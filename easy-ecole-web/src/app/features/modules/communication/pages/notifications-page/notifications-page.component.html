<div class="p-6">
  <app-header-title title="Notifications" [subtitle]="nonLues > 0 ? nonLues + ' notification(s) non lue(s)' : 'Historique des notifications'"></app-header-title>

  <div class="mt-6 flex items-center gap-3">
    <button *ngIf="nonLues > 0" (click)="marquerToutCommeLu()" class="text-sm text-blue-600 hover:text-blue-800 font-medium">
      Tout marquer comme lu
    </button>
  </div>

  <div class="bg-white rounded-lg shadow mt-4">
    <div *ngFor="let notif of notifications" class="p-4 border-b hover:bg-gray-50 flex items-start gap-3">
      <div class="mt-1.5">
        <span class="block w-2.5 h-2.5 rounded-full" [class.bg-blue-600]="!notif.lue" [class.bg-gray-300]="notif.lue"></span>
      </div>
      <div class="flex-1 min-w-0" (click)="marquerCommeLue(notif.id)">
        <div class="flex justify-between items-center">
          <p class="text-sm font-medium" [class.font-bold]="!notif.lue">{{ notif.titre }}</p>
          <span class="text-xs text-gray-400 shrink-0">{{ notif.date | date:'dd/MM/yyyy HH:mm' }}</span>
        </div>
        <p class="text-sm text-gray-600 mt-0.5">{{ notif.message }}</p>
      </div>
      <button (click)="supprimerNotification(notif.id)" class="text-gray-400 hover:text-red-600 shrink-0" title="Supprimer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div *ngIf="notifications.length === 0" class="p-8 text-center text-gray-500">
      Aucune notification
    </div>
  </div>
</div>
