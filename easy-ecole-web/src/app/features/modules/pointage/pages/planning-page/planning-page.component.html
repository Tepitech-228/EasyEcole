<div class="flex justify-between items-start mb-8">
    <app-header-title title="Planning hebdomadaire" subtitle="Vue d'ensemble des horaires de la semaine"></app-header-title>
    <button *ngIf="rolesValue.isInstitution || rolesValue.isAdmin || rolesValue.isRessourcesHumaines"
        (click)="loadPlanning()" class="inline-flex items-center px-3 py-2 text-xs font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors border-0 cursor-pointer">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Actualiser
    </button>
</div>

<div *ngIf="loading" class="flex justify-center py-20">
    <svg class="animate-spin h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
</div>

<div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-7 gap-4">
    <div *ngFor="let jour of jours" class="bg-white rounded-lg shadow border border-gray-100 p-4 min-h-[200px]">
        <div class="text-sm font-semibold text-gray-900 mb-3 pb-2 border-b border-gray-200">{{ jour }}</div>

        <div *ngIf="!hasEntries(jour)" class="text-xs text-gray-400 italic">Aucune programmation</div>

        <div *ngFor="let cell of planning[jour]" class="mb-2 p-2 rounded border"
            [style.background]="cell.couleur + '15'"
            [style.borderColor]="cell.couleur + '40'">
            <div class="text-xs font-medium" [style.color]="cell.couleur">{{ cell.employe }}</div>
            <div class="text-xs mt-1 text-gray-500">{{ cell.heureDebut }} - {{ cell.heureFin }}</div>
        </div>
    </div>
</div>

<div *ngIf="error && !loading" class="text-center py-20">
    <div class="text-gray-400 mb-2">
        <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>
    </div>
    <p class="text-sm text-gray-500">Impossible de charger le planning.</p>
    <p class="text-xs text-gray-400 mt-2">Configurez les plannings dans la section RH.</p>
</div>
