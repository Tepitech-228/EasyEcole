<div class="flex justify-between items-start mb-8">
    <app-header-title title="Planning hebdomadaire" subtitle="Vue d'ensemble des horaires de la semaine"></app-header-title>
</div>

<div class="grid grid-cols-1 md:grid-cols-7 gap-4">
    <div *ngFor="let jour of jours" class="bg-white rounded-lg shadow border border-gray-100 p-4 min-h-[200px]">
        <div class="text-sm font-semibold text-gray-900 mb-3 pb-2 border-b border-gray-200">{{ jour }}</div>

        <div *ngIf="!hasEntries(jour)" class="text-xs text-gray-400 italic">Aucune programmation</div>

        <div *ngFor="let cell of planning[jour]" class="mb-2 p-2 bg-indigo-50 rounded border border-indigo-100">
            <div class="text-xs font-medium text-indigo-900">{{ cell.employe }}</div>
            <div class="text-xs text-indigo-600 mt-1">
                <app-custom-badge color="blue" [text]="cell.shift"></app-custom-badge>
            </div>
            <div class="text-xs text-gray-500 mt-1">{{ cell.heureDebut }} - {{ cell.heureFin }}</div>
        </div>
    </div>
</div>
