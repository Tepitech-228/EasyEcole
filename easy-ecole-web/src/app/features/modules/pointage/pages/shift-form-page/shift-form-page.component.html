<app-custom-alert [show]="success" title="Succès" color="green">Shift enregistré avec succès</app-custom-alert>

<div class="mb-6">
    <app-return-back></app-return-back>
</div>

<div class="flex justify-between items-start mb-8">
    <app-header-title [title]="isEdit ? 'Modifier le shift' : 'Nouveau shift'" subtitle="Définir un horaire de travail"></app-header-title>
</div>

<div class="bg-white rounded-lg shadow border border-gray-100 p-8">
    <form [formGroup]="form">
        <div class="grid grid-cols-1 gap-6 max-w-lg">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nom du shift</label>
                <input type="text" formControlName="nom" placeholder="Ex: Matin, Après-midi..." class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Heure de début</label>
                    <input type="time" formControlName="heureDebut" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Heure de fin</label>
                    <input type="time" formControlName="heureFin" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Jours de la semaine</label>
                <div class="flex flex-wrap gap-2">
                    <button *ngFor="let jour of joursSemaine" type="button" (click)="toggleJour(jour)"
                        [class.bg-indigo-600]="form.get('jours')?.value?.includes(jour)"
                        [class.text-white]="form.get('jours')?.value?.includes(jour)"
                        [class.bg-gray-200]="!form.get('jours')?.value?.includes(jour)"
                        [class.text-gray-700]="!form.get('jours')?.value?.includes(jour)"
                        class="px-4 py-2 rounded-full text-sm font-medium transition-colors focus:outline-none">
                        {{ jour }}
                    </button>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" formControlName="actif" id="actif" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                <label for="actif" class="text-sm text-gray-700">Shift actif</label>
            </div>
        </div>
        <div class="flex justify-end gap-4 mt-6">
            <a routerLink="/modules/pointage/shifts" class="px-4 py-2 text-sm text-gray-700 hover:text-gray-900">Annuler</a>
            <app-custom-button (click)="save()" [text]="saving ? 'Enregistrement...' : 'Enregistrer'" [disabled]="saving || form.invalid"></app-custom-button>
        </div>
    </form>
</div>
