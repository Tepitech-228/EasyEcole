<div class="flex justify-between items-start mb-8">
    <app-header-title title="Utilisateurs" subtitle="Gestion de tous les utilisateurs du système"></app-header-title>
</div>

<div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
    <div class="p-4 border-b border-gray-100 flex items-center justify-between flex-wrap gap-4">
        <div class="relative">
            <input type="text" [(ngModel)]="searchTerm" placeholder="Rechercher un utilisateur..." class="w-64 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div class="flex gap-2">
            <select [(ngModel)]="roleFilter" class="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                <option value="">Tous les rôles</option>
                <option>Administrateur</option>
                <option>Institution</option>
                <option>Enseignant</option>
                <option>Apprenant</option>
                <option>Caissier</option>
                <option>RH</option>
            </select>
        </div>
    </div>
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom & Prénoms</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Identifiant</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Contact</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Rôle</th>
                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Statut</th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            <tr *ngFor="let u of filteredUtilisateurs" class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ u.nom }} {{ u.prenoms }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ u.identifiant }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ u.email }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ u.contact }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ u.role }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-center">
                    <app-custom-badge [text]="u.statut" [color]="getActionColor(u.statut)"></app-custom-badge>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                    <button class="text-indigo-600 hover:text-indigo-900 mr-3">Modifier</button>
                    <button class="text-red-600 hover:text-red-900">Désactiver</button>
                </td>
            </tr>
            <tr *ngIf="filteredUtilisateurs.length == 0">
                <td colspan="7" class="px-6 py-12 text-center text-sm text-gray-500">Aucun utilisateur trouvé</td>
            </tr>
        </tbody>
    </table>
</div>
