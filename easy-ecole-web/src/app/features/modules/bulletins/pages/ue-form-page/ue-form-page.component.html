<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <app-header-title
    [title]="isEditMode ? 'Modifier l\'UE' : 'Nouvelle unité d\'enseignement'"
    [subtitle]="isEditMode ? 'Modifiez les paramètres de l\'unité d\'enseignement' : 'Créez une nouvelle unité d\'enseignement'">
  </app-header-title>

  <div class="mt-8 bg-white rounded-2xl border border-gray-100 shadow-sm p-6 sm:p-8">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Code -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Code</label>
        <input type="text" formControlName="code"
               class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
               placeholder="Ex: UE-INFO-301">
        <p *ngIf="submitted && form.get('code')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
      </div>

      <!-- Libellé -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Libellé</label>
        <input type="text" formControlName="libelle"
               class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
               placeholder="Ex: Programmation avancée">
        <p *ngIf="submitted && form.get('libelle')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Semestre -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Semestre</label>
          <select formControlName="semestre"
                  class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600">
            <option value="semestre1">Semestre 1</option>
            <option value="semestre2">Semestre 2</option>
            <option value="semestre3">Semestre 3</option>
            <option value="semestre4">Semestre 4</option>
            <option value="semestre5">Semestre 5</option>
            <option value="semestre6">Semestre 6</option>
          </select>
          <p *ngIf="submitted && form.get('semestre')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>

        <!-- Parcours -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Parcours (ID)</label>
          <input type="number" formControlName="parcoursId"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                 placeholder="Ex: 1">
          <p *ngIf="submitted && form.get('parcoursId')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Crédits ECTS -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Crédits ECTS</label>
          <input type="number" formControlName="creditEcts"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                 placeholder="Ex: 6">
        </div>
      </div>

      <!-- Objectifs -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Objectifs</label>
        <textarea formControlName="objectifs" rows="4"
                  class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                  placeholder="Décrivez les objectifs pédagogiques de cette UE"></textarea>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
        <button type="button" (click)="annuler()"
                class="px-4 py-2.5 text-sm font-semibold text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-xl transition-colors border-0 cursor-pointer">
          Annuler
        </button>
        <button type="submit"
                class="px-6 py-2.5 bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm border-0 cursor-pointer">
          {{ isEditMode ? 'Enregistrer' : 'Créer' }}
        </button>
      </div>
    </form>
  </div>
</div>
