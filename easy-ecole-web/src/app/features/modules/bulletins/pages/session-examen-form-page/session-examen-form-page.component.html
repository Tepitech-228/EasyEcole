<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <app-header-title
    [title]="isEditMode ? 'Modifier la session' : 'Nouvelle session d\'examen'"
    [subtitle]="isEditMode ? 'Modifiez les paramètres de la session' : 'Créez une nouvelle session d\'examen'">
  </app-header-title>

  <div class="mt-8 bg-white rounded-2xl border border-gray-100 shadow-sm p-6 sm:p-8">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Libellé -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Libellé</label>
        <input type="text" formControlName="libelle"
               class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
               placeholder="Ex: Session principale 2025">
        <p *ngIf="submitted && form.get('libelle')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Type -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Type</label>
          <select formControlName="type"
                  class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600">
            <option value="" disabled>Sélectionner un type</option>
            <option *ngFor="let t of types" [value]="t">{{ t === 'normale' ? 'Normale' : 'Rattrapage' }}</option>
          </select>
          <p *ngIf="submitted && form.get('type')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>

        <!-- Semestre -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Semestre</label>
          <select formControlName="semestre"
                  class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600">
            <option value="" disabled>Sélectionner un semestre</option>
            <option *ngFor="let s of semestres" [value]="s">{{ s }}</option>
          </select>
          <p *ngIf="submitted && form.get('semestre')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Classe -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Classe (ID)</label>
          <input type="number" formControlName="classeId"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                 placeholder="Ex: 1">
          <p *ngIf="submitted && form.get('classeId')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>

        <!-- Année académique -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Année académique (ID)</label>
          <input type="number" formControlName="anneeAcademiqueId"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                 placeholder="Ex: 1">
          <p *ngIf="submitted && form.get('anneeAcademiqueId')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Date début -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Date début</label>
          <input type="date" formControlName="dateDebut"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600">
        </div>

        <!-- Date fin -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Date fin</label>
          <input type="date" formControlName="dateFin"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600">
        </div>
      </div>

      <!-- Statut -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Statut</label>
        <select formControlName="statut"
                class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600">
          <option *ngFor="let s of statuts" [value]="s">{{ s }}</option>
        </select>
      </div>

      <!-- Observations -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Observations</label>
        <textarea formControlName="observations" rows="3"
                  class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                  placeholder="Observations éventuelles..."></textarea>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
        <button type="button" (click)="annuler()"
                class="px-4 py-2.5 text-sm font-semibold text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-xl transition-colors border-0 cursor-pointer">
          Annuler
        </button>
        <button type="submit"
                class="px-6 py-2.5 bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm border-0 cursor-pointer">
          {{ isEditMode ? 'Enregistrer' : 'Créer' }}
        </button>
      </div>
    </form>
  </div>
</div>
