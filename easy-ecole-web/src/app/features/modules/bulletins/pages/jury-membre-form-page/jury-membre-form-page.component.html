<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <app-header-title
    [title]="isEditMode ? 'Modifier le membre du jury' : 'Nouveau membre du jury'"
    [subtitle]="isEditMode ? 'Modifiez les informations du membre' : 'Ajoutez un membre au jury de délibération'">
  </app-header-title>

  <div class="mt-8 bg-white rounded-2xl border border-gray-100 shadow-sm p-6 sm:p-8">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Délibération -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Délibération</label>
        <input type="number" formControlName="deliberationId"
               class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
               placeholder="ID de la délibération">
        <p *ngIf="submitted && form.get('deliberationId')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
      </div>

      <!-- Utilisateur -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Utilisateur</label>
        <input type="number" formControlName="utilisateurId"
               class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
               placeholder="ID de l'utilisateur">
        <p *ngIf="submitted && form.get('utilisateurId')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
      </div>

      <!-- Rôle -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Rôle</label>
        <select formControlName="role"
                class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600">
          <option value="president">Président</option>
          <option value="secretaire">Secrétaire</option>
          <option value="membre">Membre</option>
          <option value="assesseur">Assesseur</option>
        </select>
        <p *ngIf="submitted && form.get('role')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
      </div>

      <!-- Présence -->
      <div class="flex items-center gap-3">
        <input type="checkbox" formControlName="presence" id="presence"
               class="h-4 w-4 rounded border-gray-300 text-blue-700 focus:ring-blue-600">
        <label for="presence" class="text-sm font-medium text-gray-700">Présent</label>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
        <button type="button" (click)="annuler()"
                class="px-4 py-2.5 text-sm font-semibold text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-xl transition-colors border-0 cursor-pointer">
          Annuler
        </button>
        <button type="submit"
                class="px-6 py-2.5 bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm border-0 cursor-pointer">
          {{ isEditMode ? 'Enregistrer' : 'Créer' }}
        </button>
      </div>
    </form>
  </div>
</div>
