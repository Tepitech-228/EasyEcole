<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <app-header-title
    [title]="isEditMode ? 'Modifier l\'échelle' : 'Nouvelle échelle de notes'"
    [subtitle]="isEditMode ? 'Modifiez les paramètres du barème' : 'Créez un nouveau barème de notation'">
  </app-header-title>

  <div class="mt-8 bg-white rounded-2xl border border-gray-100 shadow-sm p-6 sm:p-8">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Nom -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Nom de l'échelle</label>
        <input type="text" formControlName="nom"
               class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
               placeholder="Ex: Très bien">
        <p *ngIf="submitted && form.get('nom')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Note min -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Note minimale</label>
          <input type="number" step="0.01" formControlName="noteMin"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400">
          <p *ngIf="submitted && form.get('noteMin')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>
        <!-- Note max -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Note maximale</label>
          <input type="number" step="0.01" formControlName="noteMax"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400">
          <p *ngIf="submitted && form.get('noteMax')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>
      </div>

      <!-- Mention -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Mention attribuée</label>
        <input type="text" formControlName="mention"
               class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
               placeholder="Ex: Assez bien">
        <p *ngIf="submitted && form.get('mention')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
      </div>

      <!-- Actif -->
      <div class="flex items-center gap-3">
        <input type="checkbox" formControlName="actif" id="actif"
               class="h-4 w-4 rounded border-gray-300 text-blue-700 focus:ring-blue-600">
        <label for="actif" class="text-sm font-medium text-gray-700">Barème actif</label>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
        <button type="button" (click)="annuler()"
                class="px-4 py-2.5 text-sm font-semibold text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-xl transition-colors border-0 cursor-pointer">
          Annuler
        </button>
        <button type="submit"
                class="px-6 py-2.5 bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm border-0 cursor-pointer">
          {{ isEditMode ? 'Enregistrer' : 'Créer' }}
        </button>
      </div>
    </form>
  </div>
</div>
