<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <app-header-title
    [title]="isEditMode ? 'Modifier la MCC' : 'Nouvelle MCC'"
    [subtitle]="isEditMode ? 'Modifiez les paramètres de la modalité de contrôle' : 'Créez une nouvelle modalité de contrôle des connaissances'">
  </app-header-title>

  <div class="mt-8 bg-white rounded-2xl border border-gray-100 shadow-sm p-6 sm:p-8">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- UE -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">UE (ID)</label>
          <input type="number" formControlName="ueId"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                 placeholder="Ex: 1">
          <p *ngIf="submitted && form.get('ueId')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>

        <!-- Cours -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Cours (ID)</label>
          <input type="number" formControlName="coursId"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                 placeholder="Ex: 1">
          <p *ngIf="submitted && form.get('coursId')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Coefficient -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Coefficient</label>
          <input type="number" step="0.1" formControlName="coefficient"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                 placeholder="Ex: 1.5">
          <p *ngIf="submitted && form.get('coefficient')?.errors?.['required']" class="mt-1 text-xs text-blue-600">Ce champ est requis</p>
          <p *ngIf="submitted && form.get('coefficient')?.errors?.['min']" class="mt-1 text-xs text-blue-600">Le coefficient doit être au moins 0.5</p>
        </div>

        <!-- Crédits ECTS -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Crédits ECTS</label>
          <input type="number" formControlName="creditEcts"
                 class="block w-full rounded-xl border-0 bg-gray-50 px-3.5 py-2.5 text-sm text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 focus:ring-2 focus:ring-blue-600 placeholder:text-gray-400"
                 placeholder="Ex: 3">
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
        <button type="button" (click)="annuler()"
                class="px-4 py-2.5 text-sm font-semibold text-gray-700 bg-gray-50 hover:bg-gray-100 rounded-xl transition-colors border-0 cursor-pointer">
          Annuler
        </button>
        <button type="submit"
                class="px-6 py-2.5 bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm border-0 cursor-pointer">
          {{ isEditMode ? 'Enregistrer' : 'Créer' }}
        </button>
      </div>
    </form>
  </div>
</div>
