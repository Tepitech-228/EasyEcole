<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <app-header-title title="Dispenses" subtitle="Gérez les dispenses de notes accordées aux étudiants"></app-header-title>

  <div class="mt-8 flex items-center justify-between">
    <p class="text-sm text-gray-500">{{ dispenses.length }} dispense(s)</p>
    <a routerLink="/bulletins/dispenses/nouveau"
       class="inline-flex items-center px-4 py-2.5 bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Nouvelle dispense
    </a>
  </div>

  <div class="mt-4 bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-100">
        <thead>
          <tr class="bg-gray-50/50">
            <th class="px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Étudiant</th>
            <th class="px-5 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Matière</th>
            <th class="px-5 py-3.5 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider">Statut</th>
            <th class="px-5 py-3.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr *ngFor="let d of dispenses; trackBy: trackByFn" class="hover:bg-gray-50/50 transition-colors">
            <td class="px-5 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ d.etudiantNom || '-' }}</td>
            <td class="px-5 py-4 whitespace-nowrap text-sm text-gray-700">{{ d.matiereLibelle || '-' }}</td>
            <td class="px-5 py-4 whitespace-nowrap text-center">
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                    [ngClass]="d.statut === 'accordee' ? 'bg-green-50 text-green-700 ring-1 ring-green-200' : 'bg-amber-50 text-amber-700 ring-1 ring-amber-200'">
                {{ d.statut === 'accordee' ? 'Accordée' : 'En attente' }}
              </span>
            </td>
            <td class="px-5 py-4 whitespace-nowrap text-right">
              <div class="flex items-center justify-end gap-2">
                <a [routerLink]="['/bulletins/dispenses', d.id]"
                   class="inline-flex items-center px-3 py-1.5 text-xs font-semibold text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors">
                  Modifier
                </a>
                <button (click)="supprimer(d.id)"
                        class="inline-flex items-center px-3 py-1.5 text-xs font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors border-0 cursor-pointer">
                  Supprimer
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div *ngIf="dispenses.length === 0" class="px-5 py-12 text-center">
      <svg class="mx-auto h-12 w-12 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <p class="mt-4 text-sm text-gray-500">Aucune dispense enregistrée</p>
      <a routerLink="/bulletins/dispenses/nouveau" class="mt-2 inline-block text-sm text-blue-600 hover:text-blue-700 font-medium">Créer une dispense</a>
    </div>
  </div>
</div>
