<div class="page-header">
  <h1>Générer les bulletins</h1>
</div>

<div class="card">
  <div class="card-body">
    <div class="form-group">
      <label>Année académique</label>
      <select class="form-control" [(ngModel)]="anneeAcademiqueId">
        <option [ngValue]="null">Sélectionner...</option>
      </select>
    </div>
    <div class="form-group">
      <label>Semestre</label>
      <select class="form-control" [(ngModel)]="semestre">
        <option value="">Sélectionner...</option>
        <option value="semestre1">Semestre 1</option>
        <option value="semestre2">Semestre 2</option>
      </select>
    </div>
    <div class="form-group">
      <label>Classe</label>
      <select class="form-control" [(ngModel)]="classeId">
        <option [ngValue]="null">Sélectionner...</option>
      </select>
    </div>
    <button class="btn btn-primary" (click)="generer()" [disabled]="!anneeAcademiqueId() || !semestre() || !classeId() || loading()">
      {{ loading() ? 'Génération...' : 'Générer les bulletins' }}
    </button>
  </div>
</div>

<div *ngIf="resultat() as bulletins" class="alert alert-success mt-3">
  {{ bulletins.length }} bulletin(s) créé(s)
  <a routerLink="/bulletins" class="btn btn-outline-primary ml-2">Voir les bulletins</a>
</div>

<div *ngIf="erreur() as msg" class="alert alert-danger mt-3">
  {{ msg }}
</div>
