<div class="flex flex-col h-full">
  <div class="p-3 border-b border-gray-200 bg-gray-50 flex items-center justify-between">
    <h3 class="font-semibold text-gray-700">{{ salon.titre }}</h3>
    <span class="text-xs text-gray-400">{{ members.length }} membre{{ members.length > 1 ? 's' : '' }}</span>
  </div>

  <div class="flex flex-1 overflow-hidden">
    <div class="flex-1 flex flex-col overflow-hidden">
      <div class="flex-1 overflow-y-auto p-4 space-y-3">
        <div *ngFor="let msg of messages" class="flex" [ngClass]="{'justify-end': isOwnMessage(msg.utilisateurId), 'justify-start': !isOwnMessage(msg.utilisateurId)}">
          <div class="max-w-xs px-4 py-2 rounded-lg" [ngClass]="isOwnMessage(msg.utilisateurId) ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-800'">
            <p class="text-sm">{{ msg.message }}</p>
            <span class="text-xs opacity-75 block text-right mt-1">{{ msg.date | date:'short' }}</span>
          </div>
        </div>
        <div *ngIf="messages.length === 0" class="text-center text-gray-400 text-sm py-8">
          Aucun message. Soyez le premier à écrire !
        </div>
        <div *ngIf="typingUsers.length > 0" class="text-xs text-gray-400 italic">
          {{ typingUsers.join(', ') }} {{ typingUsers.length > 1 ? 'écrivent' : 'écrit' }}...
        </div>
      </div>

      <div class="p-3 border-t border-gray-200 flex gap-2">
        <input [(ngModel)]="messageText" (keyup.enter)="sendMessage()" (keyup)="notifyTyping()" type="text" placeholder="Votre message..." class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button (click)="sendMessage()" [disabled]="!messageText.trim()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 disabled:opacity-50">
          Envoyer
        </button>
      </div>
    </div>

    <div *ngIf="members.length > 0" class="w-48 border-l border-gray-200 bg-gray-50 p-3 overflow-y-auto hidden md:block">
      <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Membres</h4>
      <div *ngFor="let member of members" class="flex items-center gap-2 py-1.5">
        <span class="w-2 h-2 rounded-full" [ngClass]="member.online ? 'bg-green-500' : 'bg-gray-300'"></span>
        <span class="text-sm text-gray-700 truncate">{{ member.name }}</span>
      </div>
    </div>
  </div>
</div>
