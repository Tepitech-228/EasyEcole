<div class="flex flex-col h-full">
  <div class="p-3 border-b border-gray-200 bg-gray-50">
    <h3 class="font-semibold text-gray-700">{{ salon.titre }}</h3>
  </div>

  <div class="flex-1 overflow-y-auto p-4 space-y-3">
    <div *ngFor="let msg of messages" class="flex" [ngClass]="{'justify-end': msg.utilisateurId === 1, 'justify-start': msg.utilisateurId !== 1}">
      <div class="max-w-xs px-4 py-2 rounded-lg" [ngClass]="msg.utilisateurId === 1 ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-800'">
        <p class="text-sm">{{ msg.message }}</p>
        <span class="text-xs opacity-75 block text-right mt-1">{{ msg.date | date:'short' }}</span>
      </div>
    </div>
    <div *ngIf="messages.length === 0" class="text-center text-gray-400 text-sm py-8">
      Aucun message. Soyez le premier à écrire !
    </div>
  </div>

  <div class="p-3 border-t border-gray-200 flex gap-2">
    <input [(ngModel)]="messageText" (keyup.enter)="sendMessage()" type="text" placeholder="Votre message..." class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    <button (click)="sendMessage()" [disabled]="!messageText.trim()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 disabled:opacity-50">
      Envoyer
    </button>
  </div>
</div>
