<div class="p-6">
  <app-header-title title="Devoirs" subtitle="Liste des devoirs et exercices à rendre"></app-header-title>

  <div *ngIf="devoirs.length === 0" class="text-center py-12 text-gray-500">
    Aucun devoir pour le moment.
  </div>

  <div class="mt-6 space-y-4">
    <div *ngFor="let devoir of devoirs" class="bg-white rounded-lg shadow-md p-5 hover:shadow-lg transition-shadow cursor-pointer" (click)="voirDevoir(devoir.id)">
      <div class="flex items-start justify-between">
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            <h3 class="text-lg font-semibold text-gray-800">{{ devoir.titre }}</h3>
            <app-custom-badge [text]="devoir.statut" [color]="getStatutColor(devoir.statut)"></app-custom-badge>
          </div>
          <p class="text-sm text-gray-600 mb-2">{{ devoir.description }}</p>
          <div class="flex items-center gap-4 text-xs text-gray-400">
            <span>{{ devoir.coursTitre }}</span>
            <span>Date limite: {{ devoir.dateLimite | date:'dd/MM/yyyy' }}</span>
            <span *ngIf="devoir.note !== undefined" class="font-semibold text-gray-600">Note: {{ devoir.note }}/20</span>
          </div>
        </div>
        <svg class="w-5 h-5 text-gray-400 flex-shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </div>
    </div>
  </div>
</div>
