<div class="p-6">
  <app-header-title title="Suivi de progression" subtitle="Consultez votre avancement dans chaque cours"></app-header-title>

  <div class="bg-white rounded-lg shadow-md p-6 mt-6 mb-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold text-gray-800">Progression globale</h3>
      <span class="text-2xl font-bold text-blue-600">{{ globalProgress }}%</span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-4">
      <div class="bg-blue-600 h-4 rounded-full transition-all" [style.width.%]="globalProgress"></div>
    </div>
  </div>

  <div *ngIf="progressions.length === 0" class="text-center py-12 text-gray-500">
    Aucune progression enregistrée.
  </div>

  <div class="space-y-4">
    <div *ngFor="let prog of progressions" class="bg-white rounded-lg shadow-md p-5">
      <div class="flex items-center justify-between mb-3">
        <div>
          <h4 class="font-semibold text-gray-800">{{ prog.coursTitre }}</h4>
          <p class="text-sm text-gray-500">{{ prog.modulesCompleted }} / {{ prog.modulesTotal }} modules complétés</p>
        </div>
        <div class="text-right">
          <div class="text-xl font-bold"
               [ngClass]="prog.pourcentage === 100 ? 'text-green-600' : prog.pourcentage >= 50 ? 'text-blue-600' : 'text-gray-500'">
            {{ prog.pourcentage }}%
          </div>
          <app-custom-badge *ngIf="prog.pourcentage === 100" text="Terminé" color="green"></app-custom-badge>
          <app-custom-badge *ngIf="prog.pourcentage > 0 && prog.pourcentage < 100" text="En cours" color="blue"></app-custom-badge>
          <app-custom-badge *ngIf="prog.pourcentage === 0" text="Non commencé" color="gray"></app-custom-badge>
        </div>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-3">
        <div class="h-3 rounded-full transition-all"
             [ngClass]="prog.pourcentage === 100 ? 'bg-green-500' : prog.pourcentage >= 50 ? 'bg-blue-500' : 'bg-gray-400'"
             [style.width.%]="prog.pourcentage"></div>
      </div>
    </div>
  </div>
</div>
