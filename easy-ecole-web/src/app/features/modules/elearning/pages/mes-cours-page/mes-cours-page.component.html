<div class="p-6">
  <app-header-title title="Mes cours e-learning"></app-header-title>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="spinner-border text-primary" role="status">
      <span class="sr-only">Chargement...</span>
    </div>
  </div>

  <div *ngIf="!loading && coursList.length === 0" class="text-center py-12 text-gray-500">
    Aucun cours e-learning disponible.
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6">
    <div *ngFor="let cours of coursList" class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow">
      <img [src]="'/orientation/parcours/' + cours.image" alt="{{ cours.titre }}" class="w-full h-40 object-cover" *ngIf="cours.image">
      <div class="p-4" [routerLink]="['/elearning', cours.id]" class="cursor-pointer">
        <h3 class="text-lg font-semibold text-gray-800">{{ cours.titre }}</h3>
        <p class="text-sm text-gray-600 mt-2">{{ cours.description }}</p>
        <div class="flex items-center justify-between mt-4">
          <span class="text-xs text-gray-400">{{ cours.modules?.length || 0 }} module(s)</span>
          <span class="px-2 py-1 text-xs rounded-full" [ngClass]="cours.statut === 'actif' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'">{{ cours.statut }}</span>
        </div>
      </div>
      <div class="px-4 pb-4 flex gap-2">
        <a [routerLink]="['/elearning', cours.id]" class="text-sm text-blue-600 hover:underline">Voir le cours</a>
        <a [routerLink]="['/elearning', cours.id, 'chat']" class="text-sm text-blue-600 hover:underline">Chat</a>
      </div>
    </div>
  </div>
</div>
