<div class="p-6">
  <app-header-title title="Mes certificats" subtitle="Certificats de completion obtenus"></app-header-title>

  <div *ngIf="certificats.length === 0" class="text-center py-12 text-gray-500">
    Aucun certificat obtenu pour le moment.
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6">
    <div *ngFor="let cert of certificats" class="bg-white rounded-lg shadow-md overflow-hidden border-t-4" [ngClass]="cert.statut === 'valide' ? 'border-green-500' : 'border-red-400'">
      <div class="p-5">
        <div class="flex items-center justify-between mb-3">
          <div class="text-3xl">🎓</div>
          <app-custom-badge [text]="cert.statut" [color]="getStatutColor(cert.statut)"></app-custom-badge>
        </div>
        <h3 class="text-lg font-semibold text-gray-800 mb-1">{{ cert.coursTitre }}</h3>
        <p class="text-sm text-gray-600 mb-3">{{ cert.description }}</p>
        <div class="flex items-center justify-between text-sm text-gray-500 border-t pt-3">
          <span>Obtenu le {{ cert.dateObtention | date:'dd/MM/yyyy' }}</span>
          <span class="font-semibold text-gray-700">Note: {{ cert.note }}/100</span>
        </div>
      </div>
      <div *ngIf="cert.statut === 'valide'" class="bg-green-50 px-5 py-3 border-t border-green-100">
        <button class="text-green-700 hover:text-green-800 text-sm font-medium">
          Télécharger le certificat
        </button>
      </div>
    </div>
  </div>
</div>
