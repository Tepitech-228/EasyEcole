<div class="p-6 h-full flex flex-col">
  <app-return-back></app-return-back>
  <app-header-title title="Salons de discussion"></app-header-title>

  <div class="flex gap-4 mt-4 flex-1">
    <div class="w-1/3 bg-white rounded-lg shadow-md p-4">
      <h2 class="font-semibold text-gray-700 mb-3">Salons</h2>
      <div *ngIf="loading" class="text-center text-gray-400">Chargement...</div>
      <ul *ngIf="!loading">
        <li *ngFor="let salon of salons" (click)="selectSalon(salon)" class="p-2 rounded cursor-pointer" [ngClass]="selectedSalon?.id === salon.id ? 'bg-blue-100 text-blue-700' : 'hover:bg-gray-100'">
          {{ salon.titre }}
          <span class="text-xs text-gray-400 block">{{ salon.type }}</span>
        </li>
        <li *ngIf="salons.length === 0" class="text-gray-400 text-sm">Aucun salon disponible.</li>
      </ul>
    </div>

    <div class="flex-1 bg-white rounded-lg shadow-md">
      <app-chat-window *ngIf="selectedSalon" [salon]="selectedSalon"></app-chat-window>
      <div *ngIf="!selectedSalon" class="flex items-center justify-center h-full text-gray-400">
        Sélectionnez un salon pour commencer à discuter.
      </div>
    </div>
  </div>
</div>
