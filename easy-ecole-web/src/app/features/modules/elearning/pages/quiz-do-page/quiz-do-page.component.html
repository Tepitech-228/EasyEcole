<div class="p-6">
  <app-header-title title="{{ quiz?.titre || 'Quiz' }}"></app-header-title>

  <div *ngIf="!quiz" class="text-center py-12 text-gray-500">
    Quiz introuvable.
    <br>
    <button (click)="goBack()" class="text-blue-600 hover:underline mt-2">Retour à la liste</button>
  </div>

  <div *ngIf="quiz && !submitted" class="mt-6 max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-5 mb-4">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-gray-500">Question {{ currentQuestionIndex + 1 }} sur {{ totalQuestions }}</span>
        <span class="text-sm text-gray-500">{{ quiz.timeLimit }} min</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2">
        <div class="bg-blue-600 h-2 rounded-full transition-all" [style.width.%]="progressPercent"></div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6 mb-4">
      <h3 class="text-lg font-semibold text-gray-800 mb-4">{{ currentQuestion?.texte }}</h3>
      <div class="space-y-3">
        <div *ngFor="let option of currentQuestion?.options; let oi = index"
             (click)="selectAnswer(oi)"
             class="border border-gray-200 rounded-lg p-3 cursor-pointer transition-colors"
             [ngClass]="{
               'border-blue-500 bg-blue-50': isAnswerSelected(oi),
               'hover:border-gray-300 hover:bg-gray-50': !isAnswerSelected(oi)
             }">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium"
                 [ngClass]="isAnswerSelected(oi) ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-600'">
              {{ ['A', 'B', 'C', 'D'][oi] }}
            </div>
            <span class="text-gray-700">{{ option }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="flex items-center justify-between">
      <div>
        <button *ngIf="currentQuestionIndex > 0" (click)="prevQuestion()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
          Précédent
        </button>
      </div>
      <div class="flex gap-3">
        <button *ngIf="currentQuestionIndex < totalQuestions - 1" (click)="nextQuestion()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700" [disabled]="selectedAnswers[currentQuestionIndex] === undefined">
          Suivant
        </button>
        <button *ngIf="currentQuestionIndex === totalQuestions - 1" (click)="finishQuiz()" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700" [disabled]="!allAnswered">
          Terminer
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="quiz && submitted" class="mt-6 max-w-3xl mx-auto text-center">
    <div class="bg-white rounded-lg shadow-md p-8">
      <div class="text-6xl mb-4">🏆</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Quiz terminé !</h2>
      <p class="text-gray-600 mb-6">{{ quiz.titre }}</p>

      <div class="w-40 h-40 rounded-full border-8 flex items-center justify-center mx-auto mb-6"
           [ngClass]="score && score >= 70 ? 'border-green-500' : score && score >= 40 ? 'border-yellow-500' : 'border-red-500'">
        <div>
          <div class="text-3xl font-bold" [ngClass]="score && score >= 70 ? 'text-green-600' : score && score >= 40 ? 'text-yellow-600' : 'text-red-600'">{{ score }}%</div>
          <div class="text-sm text-gray-500">{{ totalCorrect }}/{{ totalQuestions }}</div>
        </div>
      </div>

      <app-custom-alert [show]="true" [title]="score && score >= 70 ? 'Félicitations ! Excellent résultat.' : score && score >= 40 ? 'Bon résultat, continuez à réviser.' : 'Quiz difficile, essayez de réviser et recommencez.'" [type]="score && score >= 70 ? 'success' : score && score >= 40 ? 'warning' : 'danger'"></app-custom-alert>

      <div class="mt-6">
        <app-custom-button text="Retour aux quiz" color="primary" (click)="goBack()"></app-custom-button>
      </div>
    </div>
  </div>
</div>
