<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <app-header-title title="Gestion e-learning"></app-header-title>
    <button (click)="toggleCreateForm()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
      {{ showCreateForm ? 'Annuler' : 'Nouveau cours' }}
    </button>
  </div>

  <div *ngIf="showCreateForm" class="bg-white rounded-lg shadow-md p-6 mb-6">
    <h3 class="text-lg font-semibold mb-4">Créer un nouveau cours</h3>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">Titre</label>
      <input [(ngModel)]="newCours.titre" type="text" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">Description</label>
      <textarea [(ngModel)]="newCours.description" class="mt-1 block w-full border border-gray-300 rounded-md p-2"></textarea>
    </div>
    <button (click)="createCours()" [disabled]="!newCours.titre" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 disabled:opacity-50">
      Créer
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="spinner-border text-primary" role="status">
      <span class="sr-only">Chargement...</span>
    </div>
  </div>

  <div *ngIf="!loading" class="bg-white rounded-lg shadow-md overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Titre</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Statut</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Modules</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <tr *ngFor="let cours of coursList">
          <td class="px-6 py-4">
            <a [routerLink]="['/elearning', cours.id]" class="text-blue-600 hover:underline">{{ cours.titre }}</a>
          </td>
          <td class="px-6 py-4">
            <span class="px-2 py-1 text-xs rounded-full" [ngClass]="cours.statut === 'actif' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'">{{ cours.statut }}</span>
          </td>
          <td class="px-6 py-4 text-sm text-gray-500">{{ cours.modules?.length || 0 }}</td>
          <td class="px-6 py-4 text-right">
            <a [routerLink]="['/elearning', cours.id, 'upload']" class="text-sm text-blue-600 hover:underline mr-3">Upload</a>
            <button (click)="deleteCours(cours.id)" class="text-sm text-red-600 hover:underline">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="coursList.length === 0" class="text-center py-8 text-gray-400">Aucun cours e-learning.</div>
  </div>
</div>
