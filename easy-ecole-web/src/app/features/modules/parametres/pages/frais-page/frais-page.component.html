<div class="flex justify-between items-start mb-8">
    <app-header-title title="Frais" subtitle="Gestion des frais et tarifs"></app-header-title>
    <a routerLink="nouveau" class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700">
        + Nouveau frais
    </a>
</div>

<div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Montant</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Périodicité</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Description</th>
                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Statut</th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            <tr *ngFor="let f of fraisList" class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ f.nom }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ f.montant | number }} FCFA</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ f.periodicite }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ f.description }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-center">
                    <app-custom-badge [color]="f.actif ? 'green' : 'red'" [text]="f.actif ? 'Actif' : 'Inactif'"></app-custom-badge>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                    <a [routerLink]="[f.id]" class="text-indigo-600 hover:text-indigo-900">Modifier</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
