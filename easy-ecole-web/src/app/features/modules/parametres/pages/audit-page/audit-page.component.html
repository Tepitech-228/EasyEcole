<div class="flex justify-between items-start mb-8">
    <app-header-title title="Journal d'audit" subtitle="Historique des actions système"></app-header-title>
</div>

<div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
    <div class="p-4 border-b border-gray-100 flex items-center justify-between">
        <div class="relative">
            <input type="text" placeholder="Rechercher..." class="w-64 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div class="flex gap-2">
            <select class="rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                <option value="">Toutes les actions</option>
                <option>Connexion</option>
                <option>Création</option>
                <option>Modification</option>
                <option>Suppression</option>
            </select>
        </div>
    </div>
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Utilisateur</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Action</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Entité</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Détails</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            <tr *ngFor="let log of logs" class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ log.date }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ log.utilisateur }}</td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <app-custom-badge [text]="log.action" [color]="getActionColor(log.action)"></app-custom-badge>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ log.entite }}</td>
                <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate">{{ log.details }}</td>
            </tr>
        </tbody>
    </table>
</div>
