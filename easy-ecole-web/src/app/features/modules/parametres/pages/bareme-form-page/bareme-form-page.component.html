<app-custom-alert [show]="success" title="Succès" color="green">Barème enregistré</app-custom-alert>

<div class="flex justify-between items-start mb-8">
    <app-header-title [title]="isEdit ? 'Modifier le barème' : 'Nouveau barème'" subtitle="Définir un intervalle de notes"></app-header-title>
</div>

<div class="bg-white rounded-lg shadow border border-gray-100 p-8">
    <form [formGroup]="form">
        <div class="grid grid-cols-1 gap-6 max-w-lg">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nom</label>
                <input type="text" formControlName="nom" placeholder="Ex: Excellent" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Note minimale</label>
                    <input type="number" formControlName="noteMin" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Note maximale</label>
                    <input type="number" formControlName="noteMax" step="0.01" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Mention</label>
                <input type="text" formControlName="mention" placeholder="Ex: TB" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Appréciation</label>
                <textarea formControlName="appreciation" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"></textarea>
            </div>
        </div>
        <div class="flex justify-end gap-4 mt-6">
            <a routerLink="../" class="px-4 py-2 text-sm text-gray-700 hover:text-gray-900">Annuler</a>
            <app-custom-button (click)="save()" [text]="saving ? 'Enregistrement...' : 'Enregistrer'" [disabled]="saving || form.invalid"></app-custom-button>
        </div>
    </form>
</div>
