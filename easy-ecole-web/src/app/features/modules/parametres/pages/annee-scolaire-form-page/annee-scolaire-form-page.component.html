<app-custom-alert [show]="success" title="Succès" color="green">Année scolaire enregistrée</app-custom-alert>

<div class="flex justify-between items-start mb-8">
    <app-header-title [title]="isEdit ? 'Modifier l\'année scolaire' : 'Nouvelle année scolaire'" subtitle="Définir les dates et le libellé"></app-header-title>
</div>

<div class="bg-white rounded-lg shadow border border-gray-100 p-8">
    <form [formGroup]="form" (ngSubmit)="save()">
        <div class="grid grid-cols-1 gap-6 max-w-lg">
            <div>
                <label class="block text-sm font-medium text-gray-700">Libellé</label>
                <input type="text" formControlName="libelle" placeholder="Ex: 2026-2027" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Date de début</label>
                    <input type="date" formControlName="dateDebut" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Date de fin</label>
                    <input type="date" formControlName="dateFin" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" formControlName="estCourante" id="estCourante" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                <label for="estCourante" class="text-sm text-gray-700">Définir comme année courante</label>
            </div>
        </div>
        <div class="flex justify-end gap-4 mt-6">
            <a routerLink="../" class="px-4 py-2 text-sm text-gray-700 hover:text-gray-900">Annuler</a>
            <app-custom-button type="submit" [text]="saving ? 'Enregistrement...' : 'Enregistrer'" [disabled]="saving || form.invalid"></app-custom-button>
        </div>
    </form>
</div>
