<app-custom-alert [show]="success" title="Succès" color="green">Modèle enregistré</app-custom-alert>

<div class="flex justify-between items-start mb-8">
    <app-header-title title="Modifier le modèle" subtitle="Personnaliser le contenu du modèle"></app-header-title>
</div>

<div class="bg-white rounded-lg shadow border border-gray-100 p-8">
    <form [formGroup]="form">
        <div class="grid grid-cols-1 gap-6 max-w-2xl">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nom</label>
                <input type="text" formControlName="nom" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Sujet</label>
                <input type="text" formControlName="sujet" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contenu</label>
                <p class="text-xs text-gray-500 mb-2">Variables disponibles: (nom), (prenom), (email), (annee)</p>
                <textarea formControlName="contenu" rows="12" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm font-mono"></textarea>
            </div>
        </div>
        <div class="flex justify-end gap-4 mt-6">
            <a routerLink="../" class="px-4 py-2 text-sm text-gray-700 hover:text-gray-900">Annuler</a>
            <app-custom-button (click)="save()" [text]="saving ? 'Enregistrement...' : 'Enregistrer'" [disabled]="saving || form.invalid"></app-custom-button>
        </div>
    </form>
</div>
