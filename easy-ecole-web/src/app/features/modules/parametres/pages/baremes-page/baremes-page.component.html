<div class="flex justify-between items-start mb-8">
    <app-header-title title="Barèmes" subtitle="Échelles de notation et mentions"></app-header-title>
    <a routerLink="nouveau" class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700">
        + Nouveau barème
    </a>
</div>

<div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Note min</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Note max</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Mention</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Appréciation</th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            <tr *ngFor="let b of baremes" class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ b.nom }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ b.noteMin }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ b.noteMax }}</td>
                <td class="px-6 py-4 whitespace-nowrap"><app-custom-badge text="{{ b.mention }}" color="indigo"></app-custom-badge></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ b.appreciation }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                    <a [routerLink]="[b.id]" class="text-indigo-600 hover:text-indigo-900">Modifier</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
