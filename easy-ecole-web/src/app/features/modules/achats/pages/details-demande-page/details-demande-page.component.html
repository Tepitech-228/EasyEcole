<div class="mb-8">
    <app-header-title title="Détails de la demande" subtitle="Consulter les informations de la demande d'achat"></app-header-title>
</div>

<div class="bg-white rounded-lg shadow p-6">
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div>
            <label class="text-xs font-medium text-gray-500">Description</label>
            <p class="text-sm text-gray-800 mt-1">---</p>
        </div>
        <div>
            <label class="text-xs font-medium text-gray-500">Statut</label>
            <p class="text-sm text-gray-800 mt-1">---</p>
        </div>
        <div>
            <label class="text-xs font-medium text-gray-500">Soumis par</label>
            <p class="text-sm text-gray-800 mt-1">---</p>
        </div>
        <div>
            <label class="text-xs font-medium text-gray-500">Date de soumission</label>
            <p class="text-sm text-gray-800 mt-1">---</p>
        </div>
    </div>

    <h3 class="text-md font-semibold text-gray-800 mb-3">Lignes de demande</h3>
    <table class="min-w-full border mb-6">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-2 py-2 text-left text-xs font-medium text-gray-500">Désignation</th>
                <th class="px-2 py-2 text-left text-xs font-medium text-gray-500">Quantité</th>
                <th class="px-2 py-2 text-left text-xs font-medium text-gray-500">Prix estimé</th>
                <th class="px-2 py-2 text-left text-xs font-medium text-gray-500">Unité</th>
                <th class="px-2 py-2 text-right text-xs font-medium text-gray-500">Total</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="5" class="text-center py-4 text-sm text-gray-500">Aucune ligne</td></tr>
        </tbody>
    </table>

    <div class="flex justify-end gap-x-3">
        <app-custom-button text="Retour" link="/achats/demandes"></app-custom-button>
    </div>
</div>
