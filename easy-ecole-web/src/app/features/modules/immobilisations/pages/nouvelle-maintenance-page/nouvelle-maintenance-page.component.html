<app-custom-alert [show]="error" title="Erreur">
    Une erreur est survenue lors de la création
</app-custom-alert>

<app-return-back></app-return-back>

<div class="flex justify-between items-start mb-8">
    <app-header-title title="Nouvelle maintenance" subtitle="Veuillez renseigner les informations ci-dessous pour ajouter une nouvelle maintenance"></app-header-title>
    <div class="flex justify-end items-center">
    </div>
</div>

<div class="w-full mb-8">
    <form [formGroup]="maintenanceForm" id="maintenanceForm">
        <div class="grid grid-cols-6 md:gap-x-24 gap-x-0 gap-y-10 mb-8">
            <div class="md:col-span-4 col-span-full">
                <label for="immobilisationId" class="mb-2 block text-sm leading-6 text-gray-600">Immobilisation</label>
                <select id="immobilisationId" formControlName="immobilisationId"
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                    <option value="" disabled>Sélectionner une immobilisation</option>
                    <option *ngFor="let immo of immobilisations" [value]="immo.id">{{ immo.nom }}</option>
                </select>
                <div *ngIf="maintenanceForm.get('immobilisationId')!.invalid && (maintenanceForm.get('immobilisationId')!.dirty || maintenanceForm.get('immobilisationId')!.touched)">
                    <app-form-message *ngIf="maintenanceForm.get('immobilisationId')!.errors?.['required']"
                        text="Veuillez sélectionner une immobilisation"></app-form-message>
                </div>
            </div>
            <div class="md:col-span-4 col-span-full">
                <label for="dateMaintenance" class="mb-2 block text-sm leading-6 text-gray-600">Date de maintenance</label>
                <input type="date" id="dateMaintenance" formControlName="dateMaintenance"
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <div *ngIf="maintenanceForm.get('dateMaintenance')!.invalid && (maintenanceForm.get('dateMaintenance')!.dirty || maintenanceForm.get('dateMaintenance')!.touched)">
                    <app-form-message *ngIf="maintenanceForm.get('dateMaintenance')!.errors?.['required']"
                        text="Veuillez saisir la date"></app-form-message>
                </div>
            </div>
            <div class="md:col-span-4 col-span-full">
                <label for="type" class="mb-2 block text-sm leading-6 text-gray-600">Type</label>
                <input type="text" id="type" formControlName="type" placeholder="Saisir le type de maintenance ici..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <div *ngIf="maintenanceForm.get('type')!.invalid && (maintenanceForm.get('type')!.dirty || maintenanceForm.get('type')!.touched)">
                    <app-form-message *ngIf="maintenanceForm.get('type')!.errors?.['required']"
                        text="Veuillez saisir le type"></app-form-message>
                </div>
            </div>
            <div class="col-span-full">
                <label for="description" class="mb-2 block text-sm leading-6 text-gray-600">Description (facultative)</label>
                <textarea rows="3" id="description" formControlName="description"
                    placeholder="Saisir la description ici..."
                    class="w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"></textarea>
            </div>
            <div class="md:col-span-4 col-span-full">
                <label for="cout" class="mb-2 block text-sm leading-6 text-gray-600">Coût (FCFA)</label>
                <input type="number" id="cout" formControlName="cout" placeholder="Saisir le coût ici..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <div *ngIf="maintenanceForm.get('cout')!.invalid && (maintenanceForm.get('cout')!.dirty || maintenanceForm.get('cout')!.touched)">
                    <app-form-message *ngIf="maintenanceForm.get('cout')!.errors?.['required']"
                        text="Veuillez saisir le coût"></app-form-message>
                </div>
            </div>
            <div class="md:col-span-4 col-span-full">
                <label for="prestataire" class="mb-2 block text-sm leading-6 text-gray-600">Prestataire (facultatif)</label>
                <input type="text" id="prestataire" formControlName="prestataire" placeholder="Saisir le prestataire ici..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
            </div>
        </div>

        <div class="w-full flex justify-end items-center pb-12">
            <app-custom-button (click)="create()" text="Enregistrer"></app-custom-button>
        </div>
    </form>
</div>
