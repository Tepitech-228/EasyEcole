<app-return-back></app-return-back>

<div class="flex justify-between items-start mb-8">
    <app-header-title title="Choix des cours facultatifs" subtitle="Les cours obligatoires seront automatiquement inclus — sélectionnez les cours facultatifs souhaités"></app-header-title>
    <div class="flex justify-end items-center gap-x-4">
        <app-custom-button (click)="retour()" text="Retour" color="gray" [outlined]="true"></app-custom-button>
        <app-custom-button (click)="valider()" text="Valider"></app-custom-button>
    </div>
</div>

<div *ngIf="coursFacultatifs.length > 0" class="flex flex-col">
    <div>
        <div class="overflow-x-auto">
            <div class="py-2 inline-block min-w-full">
                <div class="overflow-hidden">
                    <div class="w-7/12 max-w-4xl mx-auto">
                        <table class="min-w-full mb-12">
                            <thead class="bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="text-sm font-medium text-gray-900 px-2 py-4 text-left">
                                        <div class="px-2">Code</div>
                                    </th>
                                    <th scope="col" class="text-sm font-medium text-gray-900 px-2 py-4 text-left">
                                        <div class="px-2">Libellé</div>
                                    </th>
                                    <th scope="col" class="text-sm font-medium text-gray-900 px-2 py-4 text-left">
                                        <div class="px-2">Crédit / Coefficient</div>
                                    </th>
                                    <th scope="col" class="text-sm font-medium text-gray-900 px-2 py-4 text-center">
                                        <div class="px-2">Choix</div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let c of coursFacultatifs"
                                    class="bg-white hover:bg-gray-100 p-0 border-b border-slate-200 transition duration-300 ease-in-out">
                                    <td class="text-sm text-center py-4 text-gray-600 font-regular p-0 whitespace-nowrap">
                                        {{ c.code }}
                                    </td>
                                    <td class="text-sm text-center py-4 text-gray-600 font-regular p-0 whitespace-nowrap">
                                        {{ c.intitule }}
                                    </td>
                                    <td class="text-sm text-center py-4 text-gray-600 font-regular p-0 whitespace-nowrap">
                                        {{ c.credit ?? '---' }}
                                    </td>
                                    <td class="text-sm text-center py-4 text-gray-600 font-regular p-0 whitespace-nowrap">
                                        <input type="checkbox" [(ngModel)]="choixCours[c.id!]"
                                            class="h-4 w-4 border-gray-600 text-indigo-600 focus:ring-indigo-600">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div *ngIf="coursFacultatifs.length == 0" class="flex flex-col items-center justify-center py-16">
    <p class="text-sm text-gray-600 font-regular">Aucun cours facultatif disponible pour ce parcours</p>
</div>
