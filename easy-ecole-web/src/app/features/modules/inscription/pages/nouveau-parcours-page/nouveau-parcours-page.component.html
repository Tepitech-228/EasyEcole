<app-custom-alert [show]="error || alreadyExists" title="Erreur">
    {{ error ? 'Une erreur est survenue lors de la création' : '' }}
    {{ alreadyExists ? 'Ce parcours existe déjà.\nVeuillez changer le titre' : '' }}
</app-custom-alert>

<app-return-back></app-return-back>

<div class="flex justify-between items-start mb-8">
    <app-header-title title="Créer un nouveau parcours" subtitle="Veuillez renseigner les informations ci-dessous pour ajouter un nouveau parcours"></app-header-title>
    <div class="flex justify-end items-center">
        <!-- <app-custom-button (click)="ajouterParcours()" text="Enregistrer"></app-custom-button> -->
    </div>
</div>

<div class="w-full mb-8">
    <form [formGroup]="nouveauParcoursForm" id="nouveauParcoursForm">
        <div class="grid grid-cols-6 md:gap-x-24 gap-x-0 gap-y-10 mb-8">
            <div class="md:col-span-4 col-span-full">
                <label for="titre" class="mb-2 block text-sm leading-6 text-gray-600">Titre</label>
                <input type="text" id="titre" formControlName="titre" placeholder="Saisir le titre ici..."
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <app-form-message *ngIf="alreadyExists"
                    text="Titre déjà utilisé"></app-form-message>
                <div *ngIf="nouveauParcoursForm.get('titre')!.invalid && (nouveauParcoursForm.get('titre')!.dirty || nouveauParcoursForm.get('titre')!.touched)">
                    <app-form-message *ngIf="nouveauParcoursForm.get('titre')!.errors?.['required']"
                        text="Veuillez saisir le titre"></app-form-message>
                </div>
            </div>
            <div class="md:col-span-2 col-span-full">
                <label for="niveauEtude" class="mb-2 block text-sm leading-6 text-gray-600">Niveau d'étude</label>
                <select id="niveauEtude" formControlName="niveauEtude"
                    class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                    <option *ngFor="let niveau of niveauxEtude" [value]="niveau.id">{{ niveau.libelle }}</option>
                </select>
                <div *ngIf="nouveauParcoursForm.get('niveauEtude')!.invalid && (nouveauParcoursForm.get('niveauEtude')!.dirty || nouveauParcoursForm.get('niveauEtude')!.touched)">
                    <app-form-message *ngIf="nouveauParcoursForm.get('niveauEtude')!.errors?.['required']"
                        text="Veuillez saisir le niveau d'étude"></app-form-message>
                </div>
            </div>
            <div class="col-span-full">
                <label for="description" class="mb-2 block text-sm leading-6 text-gray-600">Description (facultative)</label>
                <textarea rows="5" id="description" formControlName="description"
                    placeholder="Saisir la description ici..."
                    class="w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"></textarea>
            </div>
            <div class="col-span-full">
                <div class="flex items-center justify-between">
                    <label for="" class="mb-2 block text-sm leading-6 text-gray-600">Prérequis</label>
                    <div class="relative">
                        <div>
                            <button (click)="showPrerequisModal = true"
                                class="p-1 rounded focus:ring-1 focus:ring-gray-300">
                                <img src="assets/icons/add.svg" alt="add">
                            </button>
                        </div>
                    </div>
                </div>
                <div *ngIf="prerequisParcours.length == 0" class="text-sm text-gray-400 text-center py-8">Aucun prérequis</div>
                <div *ngFor="let prerequis of prerequisParcours; index as i" class="w-full">
                    <div class="w-full flex flex-col items-center mb-8">
                        <div class="w-full mb-3 text-sm font-semibold text-gray-600 text-center flex justify-center items-center">
                            <div>{{ prerequis[0].libelle }}</div>
                            <button (click)="retirerPrerequis(i)"
                                class="ml-3 p-1 rounded focus:ring-1 focus:ring-gray-300">
                                <img width="16" src="assets/icons/delete.svg" alt="remove">
                            </button>
                        </div>
                        <div class="w-full overflow-x-auto">
                            <table class="min-w-full">
                                <thead class="bg-gray-100 border-b">
                                    <tr>
                                        <th scope="col" *ngFor="let col of columnsSchema"
                                            class="text-sm font-medium text-gray-900 px-2 py-4 text-left">
                                            <div class="px-2">{{ col.label }}</div>
                                        </th>   
                                    </tr>
                                </thead>
                                <tbody class="prerequis-no-arrow">
                                    <tr *ngIf="prerequis[1].length == 0"
                                        class="bg-white p-0 border-b transition duration-300 ease-in-out">
                                        <td class="text-sm text-center py-4 text-gray-600 font-regular p-0 whitespace-nowrap"
                                            colspan="5">Aucune note requise</td>
                                    </tr>
                                    <tr *ngFor="let row of prerequis[1]"
                                        class="bg-white hover:bg-gray-100 p-0 border-b transition duration-300 ease-in-out">
                                        <td *ngFor="let col of columnsSchema"
                                            class="bg-transparent text-sm text-gray-600 font-regular p-0 whitespace-nowrap border-0 m-0 px-2">
                                            <input type="text" readonly *ngIf="col.type == 'number'" class="block w-full h-full border-0 m-0 px-2 py-4 text-gray-600 bg-transparent sm:text-sm sm:leading-6"
                                            [value]="row[col.key]" />

                                            <select disabled *ngIf="col.type == 'list'"
                                            [ngSwitch]="col.key"
                                            class="prerequis-select min-w-full h-full bg-transparent border-0 m-0 px-2 py-4 sm:text-sm sm:leading-6"
                                            [value]="row[col.key]">
                                            <ng-container *ngSwitchCase="columnsSchema[0].key">
                                                <option *ngFor="let mat of matieres" [value]="mat.id">{{ mat.libelle }}
                                                </option>
                                            </ng-container>
                                            <ng-container *ngSwitchCase="columnsSchema[1].key">
                                                <option [value]="periodesEvaluation.EXAM">Examen</option>
                                                <option [value]="periodesEvaluation.TRIM1">1er Trimestre</option>
                                                <option [value]="periodesEvaluation.TRIM2">2e Trimestre</option>
                                                <option [value]="periodesEvaluation.TRIM3">3e Trimestre</option>
                                                <option [value]="periodesEvaluation.SEM1">1er Semestre</option>
                                                <option [value]="periodesEvaluation.SEM2">3e Semestre</option>
                                            </ng-container>
                                            <ng-container *ngSwitchCase="columnsSchema[2].key">
                                                <option [value]="typesEvaluation.MOY">Moyenne</option>
                                                <option [value]="typesEvaluation.DST">Devoir sur table</option>
                                                <option [value]="typesEvaluation.COMPO">Composition</option>
                                            </ng-container>
                                        </select>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full flex justify-end items-center pb-12">
            <app-custom-button (click)="create()" [disabled]="disableButton" text="Enregistrer"></app-custom-button>
        </div>
    </form>
</div>

<!-- // Modals -->
<app-ajout-prerequis [matieres]="matieres" [niveauxEtude]="niveauxEtude" [showPrerequisModal]="showPrerequisModal" (onAdd)="ajouterPrerequis($event)" (onClose)="showPrerequisModal = false"></app-ajout-prerequis>
