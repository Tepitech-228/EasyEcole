<div class="flex justify-between items-start mb-8">
    <app-header-title title="Cours" subtitle="Retrouver la liste de vos cours"></app-header-title>
    <div class="flex justify-end items-center">
        <app-custom-button text="Valider"></app-custom-button>
    </div>
</div>

<div class="flex flex-col">
    <div>
        <div class="overflow-x-auto">
            <div class="py-2 inline-block min-w-full">
                <div class="overflow-hidden">
                    <table class="min-w-full">
                        <thead class="bg-gray-100 border-b">
                            <tr>
                                <th scope="col" class="text-sm font-medium text-gray-900 px-2 py-4 text-left">
                                    <div class="px-2">
                                        Code
                                    </div>
                                </th>
                                <th scope="col" class="text-sm font-medium text-gray-900 px-2 py-4 text-left">
                                    <div class="px-2">
                                        Libellé
                                    </div>
                                </th>
                                <th scope="col" class="text-sm font-medium text-gray-900 px-2 py-4 text-left">
                                    <div class="px-2">
                                        Nb de Crédits
                                    </div>
                                </th>
                                <th scope="col" class="text-sm font-medium text-gray-900 px-2 py-4 text-left">
                                    <div class="px-2">
                                        Classe/Année/Semestre
                                    </div>
                                </th>
                                <th scope="col" class="text-sm font-medium text-gray-900 px-2 py-4 text-center">
                                    <div class="px-2">
                                        Choix
                                    </div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngIf="cours.length == 0"
                                class="bg-white p-0 border-b transition duration-300 ease-in-out">
                                <td class="text-sm text-center py-4 text-gray-600 font-regular p-0 whitespace-nowrap"
                                    colspan="5">Aucun cours</td>
                            </tr>
                            <tr *ngFor="let cours of cours; index as index"
                                class="bg-white hover:bg-gray-100 p-0 border-b transition duration-300 ease-in-out">
                                <td
                                    class="bg-transparent text-sm text-gray-600 font-regular p-0 whitespace-nowrap border-0 m-0 px-2">
                                    <div
                                        class="block gap-x-4 border-0 m-0 px-2 py-4 text-gray-600 bg-transparent sm:text-sm sm:leading-6">
                                        INF300
                                    </div>
                                </td>
                                <td
                                    class="bg-transparent text-sm text-gray-600 font-regular p-0 whitespace-nowrap border-0 m-0 px-2">
                                    <div class="block w-full h-full border-0 m-0 px-2 py-4 text-gray-600 bg-transparent sm:text-sm sm:leading-6">Licence professionnele - Admistration Réseaux Informatiques</div>
                                </td>
                                <td
                                    class="bg-transparent text-sm text-gray-600 font-regular p-0 whitespace-nowrap border-0 m-0 px-2">
                                    <div class="block w-full h-full border-0 m-0 px-2 py-4 text-gray-600 bg-transparent sm:text-sm sm:leading-6">4</div>
                                </td>
                                <td
                                    class="bg-transparent text-sm text-gray-600 font-regular p-0 whitespace-nowrap border-0 m-0 px-2">
                                    <div class="block w-full h-full border-0 m-0 px-2 py-4 text-gray-600 bg-transparent sm:text-sm sm:leading-6">Semestre 1</div>
                                </td>
                                <td class="bg-transparent text-sm text-gray-600 font-regular p-0 whitespace-nowrap border-0 m-0 px-2">
                                    <div
                                        class="block flex justify-center gap-x-4 border-0 m-0 px-0 py-4 text-gray-600 bg-transparent sm:text-sm sm:leading-6">
                                        <div class="flex items-center gap-x-3">
                                            <input id="check1" type="checkbox"
                                                class="h-4 w-4 border-gray-600 text-indigo-600 focus:ring-indigo-600">
                                            <!-- <label for="check1"
                                                class="block text-sm font-regular leading-6 text-gray-700">Moteur</label> -->
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <!-- <div class="w-full flex justify-end items-center">
        <app-custom-button (click)="null" [disabled]="true" text="Valider"></app-custom-button>
    </div> -->
</div>


<!-- // Modals -->
<app-custom-modal title="Nouvelle cours" subtitle="Ajouter une nouvelle cours à votre catalogue" (onCloseModal)="showNouveaucoursModal = false" [center]="true" [showModal]="showNouveaucoursModal">
    <form [formGroup]="coursForm">
        <div class="mb-6">
            <span class="mb-2 block text-sm text-gray-400">Titre</span>
            <input type="text" id="titre" formControlName="titre" placeholder="Saisir le titre ici..."
                class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">

            <div class="mb-8"
                *ngIf="coursForm.get('titre')!.invalid && (coursForm.get('titre')!.dirty || coursForm.get('titre')!.touched)">
                <app-form-message *ngIf="coursForm.get('titre')!.errors?.['required']"
                    text="Veuillez saisir le titre"></app-form-message>
            </div>
        </div>
        <div class="mb-6">
            <span class="mb-2 block text-sm text-gray-600">Parcours d'étude</span>
            <select id="parcours" formControlName="parcours"
                class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <!-- <option *ngFor="let parcours of parcours" [value]="parcours.id">{{ parcours.libelle }}</option> -->
            </select>
            <div *ngIf="coursForm.get('parcours')!.invalid && (coursForm.get('parcours')!.dirty || coursForm.get('parcours')!.touched)">
                <app-form-message *ngIf="coursForm.get('parcours')!.errors?.['required']"
                    text="Veuillez saisir le parcours d'étude"></app-form-message>
            </div>
        </div>
        <div class="mb-6">
            <span class="mb-2 block text-sm text-gray-400">Description (facultative)</span>
            <textarea rows="5" id="description" formControlName="description"
                placeholder="Saisir la description ici..."
                class="w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"></textarea>
        </div>
    </form>
    <div class="flex items-center justify-between py-3">
        <app-custom-button (click)="closeNouveaucoursModal()" text="Annuler" color="gray" [outlined]="true"></app-custom-button>
        <app-custom-button (click)="ajouterCours()" text="Enregistrer"></app-custom-button>
    </div>
</app-custom-modal>

        </div>

            <select id="parcours" formControlName="parcours"
                class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:bg-white focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
                <!-- <option *ngFor="let parcours of parcours" [value]="parcours.id">{{ parcours.libelle }}</option> -->

    <div class="flex items-center justify-between py-3">

        <app-custom-button text="Modifier"></app-custom-button>
    </div>
</app-custom-modal>

<app-custom-modal *ngIf="selectedCours" title="Supprimer" subtitle="Déplacer cette cours dans la corbeille. Voulez-vous continuer ?" (onCloseModal)="showSupprimerCoursModal = false" [center]="true" [showModal]="showSupprimerCoursModal">
    <div class="flex items-center justify-between py-30">
        <app-custom-button (click)="showSupprimerCoursModal = false" text="Annuler" [outlined]="true" color="gray"></app-custom-button>
        <app-custom-button text="Supprimer" color="red"></app-custom-button>
    </div>
</app-custom-modal>
