<div class="block" [ngClass]="isSubGroup ? 'ml-2' : ''">
  <div *ngIf="showTitle" (click)="toggle()"
    [ngClass]="isSubGroup ? 'menu-subgroup font-semibold px-4 text-sm mb-1 flex items-center justify-between cursor-pointer select-none' : 'menu-group font-bold px-4 uppercase mb-1 flex items-center justify-between cursor-pointer select-none'">
    <div class="flex items-center gap-x-2">
      <app-custom-svg-icon *ngIf="icon" class="nav-group-icon" [path]="'assets/icons/' + icon + '.svg'"></app-custom-svg-icon>
      <span class="nav-group-title-text">{{ title }}</span>
    </div>
    <svg *ngIf="!collapsed" class="nav-group-chevron transition-transform duration-200" [ngClass]="[expanded ? 'rotate-180' : '', isSubGroup ? 'w-2.5 h-2.5' : 'w-3 h-3']" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
    </svg>
  </div>
  <div class="submenu-content flex flex-col gap-y-1 overflow-hidden transition-all duration-200" [ngClass]="[expanded || collapsed ? 'max-h-screen opacity-100' : 'max-h-0 opacity-0', isSubGroup ? 'px-1 py-2' : 'px-2']">
    <ng-content></ng-content>
  </div>
</div>
