<main [ngClass]="[showMenu ? 'showMenu' : 'hideMenu', sidebarCollapsed && !hoverExpanded ? 'collapsed' : '', hoverExpanded ? 'hover-expand' : '']" class="flex justify-end">

                        <button type="button" (click)="toggleSidebar()" class="sidebar-toggle-btn hidden lg:flex" title="Réduire/Étendre le menu">
                            <svg class="h-4 w-4 text-white opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
                            </svg>
                        </button>
                        <button *ngIf="showMenu" type="button" (click)="closeMenu()" 
                            class="lg:hidden rounded-md p-1 inline-flex items-center justify-center text-gray-400 hover:text-gray-500">
                            <span class="sr-only">Close menu</span>
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
